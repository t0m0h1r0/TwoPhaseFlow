# remote.conf -- shared configuration for remote experiment workflow
REMOTE_HOST="python"
REMOTE_DIR="/root/TwoPhaseFlow"
PYTHON="python3"
VENV_DIR="/root/TwoPhaseFlow/.venv"
SSH_TIMEOUT=5

# Codex desktop sessions can start with SSH_AUTH_SOCK unset even when a usable
# agent socket exists.  remote.sh tries these first, then common OS agent globs.
# Override per-session with TWOPHASE_SSH_AUTH_SOCK=/path/to/socket if needed.
SSH_AUTH_SOCK_CANDIDATES=(
    "/private/tmp/codex-ssh-agent-test.sock"
    "/tmp/codex-ssh-agent-test.sock"
)

# rsync excludes (same for push and pull)
RSYNC_EXCLUDE=(
    --exclude='.git/'
    --exclude='__pycache__/'
    --exclude='*.pyc'
    --exclude='.venv/'
    --exclude='*.egg-info/'
    --exclude='.DS_Store'
    --exclude='paper/'
    --exclude='docs/'
    --exclude='prompts/'
    --exclude='artifacts/'
    --exclude='*.log'
    --exclude='.claude/'
    --exclude='.pytest_cache/'
)
