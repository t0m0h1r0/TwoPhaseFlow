# remote.conf -- shared configuration for remote experiment workflow
REMOTE_HOST="python"
REMOTE_DIR="/root/TwoPhaseFlow"
PYTHON="python3"
VENV_DIR="/root/TwoPhaseFlow/.venv"
SSH_TIMEOUT=5

# rsync excludes (same for push and pull)
RSYNC_EXCLUDE=(
    --exclude='.git/'
    --exclude='__pycache__/'
    --exclude='*.pyc'
    --exclude='.venv/'
    --exclude='*.egg-info/'
    --exclude='.DS_Store'
    --exclude='paper/'
    --exclude='docs/'
    --exclude='prompts/'
    --exclude='artifacts/'
    --exclude='*.log'
    --exclude='.claude/'
    --exclude='.pytest_cache/'
)
