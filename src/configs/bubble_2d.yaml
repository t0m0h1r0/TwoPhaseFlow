# =====================================================================
# 上昇気泡シミュレーション設定（2次元）
# Hysing et al. (2009) テストケース 1 に準拠
# =====================================================================

# ── グリッド ──────────────────────────────────────────────────────
ndim: 2
N: [64, 128]          # x: 64点, y: 128点（縦長ドメイン）
L: [1.0, 2.0]         # x: 0~1, y: 0~2

# ── 無次元数 ─────────────────────────────────────────────────────
Re: 35.0              # レイノルズ数
Fr: 1.0               # フルード数
We: 10.0              # ウェーバー数

# ── 流体特性（比率 = 気体/液体） ───────────────────────────────
rho_ratio: 0.1        # 密度比
mu_ratio: 0.1         # 粘性比

# ── 界面パラメータ ───────────────────────────────────────────────
epsilon_factor: 1.5   # 界面厚さ ε = epsilon_factor * min(Δx)
reinit_steps: 4       # 再初期化の擬似時間ステップ数

# ── 時間積分 ─────────────────────────────────────────────────────
cfl_number: 0.25      # CFL 数
t_end: 3.0            # 終了時刻

# ── 圧力ソルバー ─────────────────────────────────────────────────
ppe_solver_type: bicgstab   # "bicgstab" or "pseudotime"
bicgstab_tol: 1.0e-10
bicgstab_maxiter: 2000

# ── 境界条件 ─────────────────────────────────────────────────────
advection_scheme: dissipative_ccd   # §5 Dissipative CCD（デフォルト）; "weno5" も可
bc_type: wall         # "wall" or "periodic"

# ── ハードウェア ─────────────────────────────────────────────────
use_gpu: false

# ── 初期条件（InitialConditionBuilder が使用） ──────────────────
# 気体背景に液体円形気泡を 1 個配置（Hysing et al. テストケース 1）
initial_condition:
  background_phase: gas
  shapes:
    - type: circle
      center: [0.5, 0.5]    # x=0.5, y=0.5（縦長ドメインの下側）
      radius: 0.25
      interior_phase: liquid

# ── 出力設定（main.py が使用） ──────────────────────────────────
output:
  checkpoint_dir: checkpoints/bubble_2d
  checkpoint_interval: 100        # 何コールバックごとに保存するか
  visualization_interval: 20      # 何ステップごとに表示・記録するか
  output_dir: results/bubble_2d
  save_figures: true
