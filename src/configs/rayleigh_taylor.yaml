# =====================================================================
# Rayleigh-Taylor 不安定性シミュレーション設定
# =====================================================================

# ── グリッド ──────────────────────────────────────────────────────
ndim: 2
N: [64, 256]          # x: 64点, y: 256点（縦長ドメイン）
L: [0.5, 2.0]

# ── 無次元数 ─────────────────────────────────────────────────────
Re: 3000.0
Fr: 1.0
We: 1000000.0         # 表面張力無視

# ── 流体特性（重い流体 / 軽い流体） ──────────────────────────────
rho_ratio: 0.2        # 密度比 1:5
mu_ratio: 0.2

# ── 界面パラメータ ───────────────────────────────────────────────
epsilon_factor: 1.5
reinit_steps: 4

# ── 時間積分 ─────────────────────────────────────────────────────
cfl_number: 0.25
t_end: 3.0

# ── 圧力ソルバー ─────────────────────────────────────────────────
ppe_solver_type: bicgstab
bicgstab_tol: 1.0e-10
bicgstab_maxiter: 2000

# ── 境界条件 ─────────────────────────────────────────────────────
bc_type: wall

# ── ハードウェア ─────────────────────────────────────────────────
use_gpu: false

# ── 出力設定 ────────────────────────────────────────────────────
output:
  checkpoint_dir: checkpoints/rayleigh_taylor
  checkpoint_interval: 50
  visualization_interval: 20
  output_dir: results/rayleigh_taylor
  save_figures: true
