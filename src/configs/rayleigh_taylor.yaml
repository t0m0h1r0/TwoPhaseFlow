# =====================================================================
# Rayleigh-Taylor 不安定性シミュレーション設定
# =====================================================================

# ── グリッド ──────────────────────────────────────────────────────
ndim: 2
N: [64, 256]          # x: 64点, y: 256点（縦長ドメイン）
L: [0.5, 2.0]

# ── 無次元数 ─────────────────────────────────────────────────────
Re: 3000.0
Fr: 1.0
We: 1000000.0         # 表面張力無視

# ── 流体特性（重い流体 / 軽い流体） ──────────────────────────────
rho_ratio: 0.2        # 密度比 1:5
mu_ratio: 0.2

# ── 界面パラメータ ───────────────────────────────────────────────
epsilon_factor: 1.5
reinit_steps: 4

# ── 時間積分 ─────────────────────────────────────────────────────
cfl_number: 0.25
t_end: 3.0

# ── 圧力ソルバー ─────────────────────────────────────────────────
ppe_solver_type: pseudotime
pseudo_tol: 1.0e-10
pseudo_maxiter: 500

# ── 境界条件 ─────────────────────────────────────────────────────
advection_scheme: dissipative_ccd   # §5 Dissipative CCD（デフォルト）; "weno5" も可
bc_type: wall

# ── ハードウェア ─────────────────────────────────────────────────
use_gpu: false

# ── 初期条件（InitialConditionBuilder が使用） ──────────────────
# 正弦波界面: y = 1.0 + 0.1·cos(2π x / 0.5)
# 液体（重流体, ψ=1）が界面より下側（y < y_interface）
# 気体（軽流体, ψ=0）が界面より上側（y > y_interface）
initial_condition:
  background_phase: gas
  shapes:
    - type: sinusoidal_interface
      axis: 1           # y 軸法線方向
      mean: 1.0         # 平均界面位置 y = 1.0
      amplitude: 0.1    # 正弦波振幅
      wavelength: 0.5   # 波長 = Lx
      interior_phase: liquid  # y < interface → 液体（重流体）

# ── 出力設定 ────────────────────────────────────────────────────
output:
  checkpoint_dir: checkpoints/rayleigh_taylor
  checkpoint_interval: 50
  visualization_interval: 20
  output_dir: results/rayleigh_taylor
  save_figures: true
