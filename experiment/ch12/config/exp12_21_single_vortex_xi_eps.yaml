# [12-21] Single vortex (LeVeque) — xi-space epsilon strategy comparison
# Validates: §6 — eps_g_cells / eps_xi_cells on deforming-vortex benchmark.
# GPU実験: N=128, T=8, 5 cases. ローカル確認は N=32 で。

experiment:
  id: "12-21"
  title: "Single Vortex — $\\xi$-space $\\varepsilon$ strategy comparison"
  type: scheme_comparison

scheme:
  operator: single_vortex_cls
  params:
    eps_ratio: 1.5
    reinit_freq: 20
  cases:
    - label: "uniform $\\alpha=1$"
      params: {alpha_grid: 1.0}
    - label: "legacy $\\alpha=2$"
      params: {alpha_grid: 2.0}
    - label: "$\\xi$-gc4 $\\alpha=2$"
      params: {alpha_grid: 2.0, eps_g_cells: 4.0}
    - label: "$\\xi$-gc4+xc1.5 $\\alpha=2$"
      params: {alpha_grid: 2.0, eps_g_cells: 4.0, eps_xi_cells: 1.5}
    - label: "$\\xi$-gc4+xc1.5 $\\alpha=3$"
      params: {alpha_grid: 3.0, eps_g_cells: 4.0, eps_xi_cells: 1.5}

input:
  grid_sizes: [128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  layout: "1x1"
  panels:
    - error_keys: [L2_psi, area_err]
      scale: bar
      xlabel: "case"
      ylabel: "error"
      title: "Single vortex: $\\xi$-space $\\varepsilon$ strategies ($N=128$)"
  output_stem: single_vortex_xi_eps
