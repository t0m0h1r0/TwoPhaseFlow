# [12-09] Galilean invariance of CLS advection (sigma=0)
# Validates: §7 — lab-frame vs rest-frame shape/mass error comparison.
# Expected: lab-frame shape_err > rest-frame (Galilean non-invariance exposure).

experiment:
  id: "12-09"
  title: "Galilean Invariance of CLS Advection"
  type: scheme_comparison

scheme:
  operator: galilean_cls
  params:
    U_BG: 1.0
  cases:
    - label: "lab frame"
      params: {case: lab}
    - label: "rest frame"
      params: {case: rest}

input:
  grid_sizes: [32, 64, 128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  layout: "1x2"
  panels:
    - error_keys: [shape_err]
      ref_orders: [1, 2]
      xlabel: "$h$"
      ylabel: "shape error"
      title: "Shape error: lab vs rest frame"
    - error_keys: [mass_err]
      ref_orders: [2, 3]
      xlabel: "$h$"
      ylabel: "mass error"
      title: "Mass error: lab vs rest frame"
  output_stem: galilean
