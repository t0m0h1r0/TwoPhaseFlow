# [12-05] Kovasznay NS residual convergence
# Validates: Ch11 — CCD spatial accuracy on exact steady NS (Kovasznay flow).

experiment:
  id: "12-05"
  title: "Kovasznay Flow NS Residual Convergence (Re=40)"
  type: convergence_study

scheme:
  operator: kovasznay_ns
  cases:
    - label: default
      params: {Re: 40.0}

input:
  grid_sizes: [16, 32, 64, 128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - case: default
      title: "Kovasznay NS residual ($Re=40$)"
      error_keys: [err_mom, err_div]
      ref_orders: [4, 6]
      xlabel: "$h$"
      ylabel: "$L^\\infty$ residual"
  output_stem: kovasznay
