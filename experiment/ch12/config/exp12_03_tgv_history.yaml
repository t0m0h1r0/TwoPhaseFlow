# [12-03] TGV energy decay — AB2+FFT-PPE time history
# Validates: Ch11 — AB2 time integration; FFT PPE enforces div-free to machine eps.

experiment:
  id: "12-03"
  title: "Taylor-Green Vortex Energy Decay (AB2 + FFT PPE)"
  type: time_history

scheme:
  operator: tgv_ab2_history
  params:
    N: 64
    nu: 0.01
    L_dom: 6.283185307179586

input:
  N: 64
  n_steps: 200
  dt: 0.01
  checkpoint_interval: 5

visualization:
  layout: "1x2"
  panels:
    - metric_keys: [E_k]
      exact_keys: [E_k_exact]
      scale: semilogy
      xlabel: "$t$"
      ylabel: "$E_k$"
      title: "Kinetic energy decay"
      series_labels:
        E_k: "AB2 $E_k$"
        E_k_exact: "Exact $\\pi^2 e^{-4\\nu t}$"
    - metric_keys: [div_inf]
      scale: semilogy
      xlabel: "$t$"
      ylabel: "$\\|\\nabla\\cdot u\\|_\\infty$"
      title: "Divergence residual"
  output_stem: tgv_history
