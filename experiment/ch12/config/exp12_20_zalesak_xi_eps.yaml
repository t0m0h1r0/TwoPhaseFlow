# [12-20] Zalesak — xi-space epsilon strategy comparison
# Validates: §6 — eps_g_cells / eps_xi_cells vs legacy eps_g_factor.
# GPU実験: N=128, 5 cases × full rotation (~数分/case). ローカル確認は N=32 で。

experiment:
  id: "12-20"
  title: "Zalesak — $\\xi$-space $\\varepsilon$ strategy comparison"
  type: scheme_comparison

scheme:
  operator: zalesak_nonuniform
  params:
    eps_ratio: 0.5
    reinit_freq: 20
  cases:
    - label: "uniform $\\alpha=1$"
      params: {alpha_grid: 1.0}
    - label: "legacy $\\alpha=2$"
      params: {alpha_grid: 2.0}
    - label: "$\\xi$-gc4 $\\alpha=2$"
      params: {alpha_grid: 2.0, eps_g_cells: 4.0}
    - label: "$\\xi$-gc4+xc1.5 $\\alpha=2$"
      params: {alpha_grid: 2.0, eps_g_cells: 4.0, eps_xi_cells: 1.5}
    - label: "$\\xi$-gc4+xc1.5 $\\alpha=3$"
      params: {alpha_grid: 3.0, eps_g_cells: 4.0, eps_xi_cells: 1.5}

input:
  grid_sizes: [128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  layout: "1x1"
  panels:
    - error_keys: [L2_psi, area_err]
      scale: bar
      xlabel: "case"
      ylabel: "error"
      title: "Zalesak: $\\xi$-space $\\varepsilon$ strategies ($N=128$)"
  output_stem: zalesak_xi_eps
