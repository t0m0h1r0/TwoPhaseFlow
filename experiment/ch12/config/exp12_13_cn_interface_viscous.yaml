# [12-13] CN interface viscous temporal accuracy (bulk region)
# Validates: Ch5 — CN O(dt^2) in bulk; ~O(dt^1.7) near interface.

experiment:
  id: "12-13"
  title: "CN Interface-Viscous Temporal Accuracy ($\\mu_r=100$)"
  type: time_accuracy

scheme:
  operator: cn_interface_viscous
  params:
    N: 64
    mu_base: 0.01
    mu_ratio: 100.0
    decay: 1.0

input:
  n_steps_list: [10, 20, 40, 80, 160, 320]
  T_final: 0.1

reference:
  type: analytical
  solution: zero   # adapter returns bulk L2 error directly
  params: {}

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - case: default
      series_label: "CN bulk $L^2$"
      error_key: err
      ref_orders: [1, 2]
      xlabel: "$\\Delta t$"
      ylabel: "$L^2$ error (bulk)"
      title: "CN interface-viscous temporal convergence"
  output_stem: cn_interface_viscous
