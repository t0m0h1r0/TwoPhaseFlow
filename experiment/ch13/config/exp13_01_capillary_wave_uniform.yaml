# Probe: capillary wave on UNIFORM grid (alpha=1, no rebuild)
# Isolates whether blowup is caused by grid rebuild or by σ>0 moving interface

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    10.0
  max_steps:  500000
  cfl:        0.10
  snap_times: [0.0, 2.5, 5.0, 7.5, 10.0]
  print_every: 500

output:
  dir: results/exp13_01_uniform
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave uniform grid — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L-B)/(L+B)"
      file: capillary_uniform.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
