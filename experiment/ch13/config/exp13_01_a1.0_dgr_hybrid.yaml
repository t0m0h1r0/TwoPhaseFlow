# §13.1 DGR blowup diagnosis — A2: hybrid reinit (split + DGR)
# Tests if split step rescues interface → split gives correct shape for DGR

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    0.5
  max_steps:  100000
  cfl:        0.10
  snap_times: [0.0, 0.25, 0.5]
  print_every: 100
  reinit_every: 2
  reinit_method: hybrid

output:
  dir: results/diag_a2_hybrid
  save_npz: true
  figures:
    - type: time_series
      title: "A2 hybrid — KE(t)"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "t"
      ylabel: "KE"
      file: ke_hybrid.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
