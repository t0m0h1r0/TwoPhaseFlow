# CHK-171 control - rising bubble fullstack stack, uniform alpha=1
#
# Tests whether the early blowup requires the alpha=2 non-uniform grid metric.

grid:
  NX: 64
  NY: 128
  LX: 1.0
  LY: 2.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l: 833.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.001

run:
  T_final: 0.02
  cfl: 0.10
  snap_interval: 0.005
  print_every: 10
  reinit_method: ridge_eikonal
  reinit_every: 2
  reinit_eps_scale: 1.4
  ridge_sigma_0: 3.0
  phi_primary_transport: true
  reproject_mode: consistent_gfm
  advection_scheme: fccd_flux
  convection_scheme: fccd_flux
  debug_diagnostics: true

output:
  dir: results/ch13_05_rising_bubble_fullstack_alpha1_debug
  save_npz: true
  figures:
    - type: time_series
      title: "alpha=1 KE"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: ch13_05_alpha1_ke.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [0.5, 0.5]
  radius: 0.25
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
