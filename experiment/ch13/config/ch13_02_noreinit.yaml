# §13.2 再初期化なし実験 — WIKI-E-030 Exp-4
# base: ch13_02_waterair_bubble.yaml + reinit_every=0（再初期化完全停止）
#
# 目的: eikonal_xi 再初期化の関与を切り分ける（H-05, H-06, H-07, H-08）
# 期待:
#   より早くブローアップ（t < 12.6）→ reinit が安定化役を担っている
#   より遅く or ブローアップなし → reinit が不安定化役（H-05/H-06 が原因）
# 注意: 再初期化なしでは界面が徐々に崩壊するため t が長くなるほど結果は信頼性低下

grid:
  NX:  64
  NY: 128
  LX: 1.0
  LY: 2.0
  bc_type: wall
  alpha_grid: 1.5
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l: 833.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.001

run:
  T_final: 20.0
  cfl: 0.10
  snap_interval: 2.0
  print_every: 1000
  reinit_method: eikonal_xi
  reinit_every: 0
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_02_noreinit
  save_npz: true
  figures:
    - type: time_series
      title: "KE(t) — no reinit (reinit\\_every=0)"
      x: times
      y: [kinetic_energy]
      labels: ["no reinit"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      file: ch13_noreinit_ke.pdf

    - type: time_series
      title: "Bubble centroid $y_c(t)$ — no reinit"
      x: times
      y: [yc]
      labels: ["no reinit"]
      xlabel: "$t$"
      ylabel: "$y_c$"
      file: ch13_noreinit_yc.pdf

    - type: time_series
      title: "Volume conservation — no reinit"
      x: times
      y: [volume_conservation]
      labels: ["no reinit"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: ch13_noreinit_volcons.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [0.5, 0.5]
  radius: 0.25
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
