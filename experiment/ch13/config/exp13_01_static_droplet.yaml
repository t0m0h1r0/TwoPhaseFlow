# §13.1 Static droplet parasitic current — grid convergence
# Reference: Popinet (2009)
# Physics: ρ_l/ρ_g = 100, σ = 1.0, no gravity, wall BC
# Sweep: N ∈ {32, 64, 128, 256} (controlled by run script)

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall

physics:
  rho_l: 100.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.1       # uniform viscosity
  g_acc:   0.0

run:
  T_final:    null   # use max_steps instead (fixed-step convergence study)
  max_steps:  500
  cfl:        0.15
  snap_times: [0.0]  # initial snapshot only
  print_every: 100

output:
  dir: results/exp13_01
  save_npz: true
  figures:
    - type: snapshot
      title: "Static droplet — final ψ (N=64)"
      t_idx: -1
      file: snapshot_final.pdf

    - type: convergence
      title: "Parasitic current convergence"
      errors: [u_para_inf, laplace_err]
      labels: ["‖u_para‖∞", "|Δp error|"]
      xlabel: "h"
      ylabel: "error"
      orders: [2, 4]
      file: convergence.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - laplace_pressure

initial_condition:
  type: circle
  center: [0.5, 0.5]
  radius: 0.25
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
