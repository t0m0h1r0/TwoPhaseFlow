# §13.7 Bubble swarm (N=9, periodic domain)
# Reference: Tryggvason et al. (2001)
# Physics: ρ_l/ρ_g=100, Re=50, Eo=4; 3×3 grid, periodic BC
# Void fraction α = 9 × πR²/L² ≈ 0.196

grid:
  NX: 128
  NY: 128
  LX: 3.0
  LY: 3.0
  bc_type: periodic

physics:
  rho_l: 100.0
  rho_g:   1.0
  g_acc:   1.0
  Re:     50.0
  Eo:      4.0
  d_ref:   0.5     # bubble diameter

run:
  T_final:    20.0
  max_steps:  2000000
  cfl:        0.15
  snap_times: [0.0, 5.0, 10.0, 15.0, 20.0]
  print_every: 500

output:
  dir: results/exp13_07
  save_npz: true
  figures:
    - type: snapshot
      title: "Bubble swarm — t=0"
      t_idx: 0
      file: snapshot_t0.pdf

    - type: snapshot
      title: "Bubble swarm — final"
      t_idx: -1
      file: snapshot_final.pdf

    - type: time_series
      title: "Mean rise velocity U_swarm(t)"
      x: times
      y: [mean_rise_velocity]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "U_swarm"
      file: rise_velocity.pdf

    - type: time_series
      title: "Volume conservation |ΔV|/V₀"
      x: times
      y: [volume_conservation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "|ΔV|/V₀"
      yscale: log
      file: volume_conservation.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - mean_rise_velocity

# 3×3 bubble array with small random seed perturbations
# Bubble centres: (0.5+i, 0.5+j) for i,j in {0,1,2}
# Perturbation applied in script via random offset ±0.01R
initial_condition:
  type: union
  shapes:
    - type: circle
      center: [0.5, 0.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [1.5, 0.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [2.5, 0.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [0.5, 1.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [1.5, 1.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [2.5, 1.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [0.5, 2.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [1.5, 2.5]
      radius: 0.25
      interior_phase: gas
    - type: circle
      center: [2.5, 2.5]
      radius: 0.25
      interior_phase: gas

initial_velocity: null

boundary_condition: null   # periodic — no BC hook needed
