# §13.2 Rising bubble — dimensional water/air SI parameters
#
# Physical setup: R=2mm air bubble in water, standard conditions (20°C)
#   Eo = rho_l*g*d^2/sigma = 998*9.81*(4e-3)^2/0.072 ≈ 21.8  (ellipsoidal regime)
#   Oh = mu_l/sqrt(rho_l*sigma*R) = 1e-3/sqrt(998*0.072*0.002) ≈ 2.6e-3
#   Mo = g*mu_l^4*Drho/(rho_l^2*sigma^3) ≈ 2.6e-5
#
# Internal non-dimensionalization (capillary scale, applied by config_io):
#   L_ref = R = 2mm,  U_ref = sqrt(sigma/(rho_g*L_ref)) = 5.48 m/s,  t_ref = 0.365 ms
#   T_final=50ms -> T_nd~137;  snap_interval=10ms -> T_nd~27 per snapshot
#
# Expected terminal velocity: ~0.25 m/s (Eo~22, ellipsoidal)
# Bubble rises ~13mm (6.5R) in 50ms; hits top wall at ~37ms
#
# Method: eikonal_xi + phi_primary + GFM (required for rho_l/rho_g=832)

physics:
  dimensional: true
  rho_l:  998.0     # kg/m³  water at 20°C
  rho_g:    1.2     # kg/m³  air at 20°C
  sigma:   0.072    # N/m    water/air at 20°C
  mu_l:    1.0e-3   # Pa·s   water
  mu_g:    1.8e-5   # Pa·s   air
  g_acc:   9.81     # m/s²

grid:
  NX:  64
  NY: 128
  LX: 8.0e-3    # 8mm = 4R
  LY: 16.0e-3   # 16mm = 8R
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

run:
  T_final:      0.05    # 50 ms  (-> T_nd ~ 137)
  cfl:          0.10
  snap_interval: 0.01   # 10 ms per snapshot  (-> T_nd ~ 27)
  print_every:  500
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_02_waterair_bubble_si
  save_npz: true
  figures:
    - type: time_series
      title: "Bubble rise velocity $v_c$ — water/air SI (R=2mm, Eo~22)"
      x: times
      y: [vc]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$v_c$ (non-dim)"
      file: ch13_si_vc.pdf

    - type: time_series
      title: "Bubble centroid $y_c$"
      x: times
      y: [yc]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$y_c$ (non-dim)"
      file: ch13_si_yc.pdf

    - type: time_series
      title: "Volume conservation $|\\Delta V|/V_0$ (log)"
      x: times
      y: [volume_conservation]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: ch13_si_volcons.pdf

    - type: time_series
      title: "Kinetic energy $E_k(t)$"
      x: times
      y: [kinetic_energy]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$E_k$ (non-dim)"
      file: ch13_si_ke.pdf

    - type: snapshot
      title: "$t = 27$ (10 ms)"
      t_idx: 0
      contour: true
      colorbar: true
      file: ch13_si_snap_t0.pdf

    - type: snapshot
      title: "$t = 55$ (20 ms)"
      t_idx: 1
      contour: true
      colorbar: true
      file: ch13_si_snap_t1.pdf

    - type: snapshot
      title: "$t = 82$ (30 ms)"
      t_idx: 2
      contour: true
      colorbar: true
      file: ch13_si_snap_t2.pdf

    - type: snapshot
      title: "$t = 110$ (40 ms)"
      t_idx: 3
      contour: true
      colorbar: true
      file: ch13_si_snap_t3.pdf

    - type: snapshot
      title: "$t = 137$ (50 ms, final)"
      t_idx: -1
      contour: true
      colorbar: true
      file: ch13_si_snap_final.pdf

    - type: velocity_snapshot
      title: "Velocity field $t = 82$ (30 ms)"
      t_idx: 2
      contour: true
      colorbar: true
      file: ch13_si_vel_t2.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [4.0e-3, 4.0e-3]   # 4mm from left/bottom walls = 2R  (-> [2, 2] non-dim)
  radius: 2.0e-3              # 2mm = L_ref  (-> R_nd = 1.0)
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
