# §13.2 Rising bubble — dimensional water/air SI parameters
#
# Physical setup: R=5mm air bubble in water, standard conditions (20°C)
#   Eo = rho_l*g*d^2/sigma = 998*9.81*(10e-3)^2/0.072 ≈ 13.6  (ellipsoidal regime)
#   Oh = mu_l/sqrt(rho_l*sigma*R) = 1e-3/sqrt(998*0.072*0.005) ≈ 1.67e-3
#   Mo = g*mu_l^4*Drho/(rho_l^2*sigma^3) ≈ 2.6e-11
#
# Internal non-dimensionalization (capillary scale, applied by config_io):
#   L_ref = R = 5mm,  U_ref = sqrt(sigma/(rho_g*L_ref)) = 3.46 m/s,  t_ref = 1.445 ms
#   T_final=100ms -> T_nd~69;  snap_interval=20ms -> T_nd~14 per snapshot
#
# Expected terminal velocity: ~0.25 m/s (Eo~14, ellipsoidal)
# Bubble rises ~25mm (5R) in 100ms; reaches top wall at ~t=100ms
#
# Method: eikonal_xi + phi_primary + GFM (required for rho_l/rho_g=832)

physics:
  dimensional: true
  rho_l:  998.0     # kg/m³  water at 20°C
  rho_g:    1.2     # kg/m³  air at 20°C
  sigma:   0.072    # N/m    water/air at 20°C
  mu_l:    1.0e-3   # Pa·s   water
  mu_g:    1.8e-5   # Pa·s   air
  g_acc:   9.81     # m/s²

grid:
  NX: 128
  NY: 256
  LX: 20.0e-3   # 20mm = 4R
  LY: 40.0e-3   # 40mm = 8R
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

run:
  T_final:      0.10    # 100 ms  (-> T_nd ~ 69)
  cfl:          0.10
  snap_interval: 0.02   # 20 ms per snapshot  (-> T_nd ~ 14)
  print_every:  500
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_02_waterair_bubble_si
  save_npz: true
  figures:
    - type: time_series
      title: "Bubble rise velocity $v_c$ — water/air SI (R=5mm, Eo~14)"
      x: times
      y: [vc]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$v_c$ (non-dim)"
      file: ch13_si_vc.pdf

    - type: time_series
      title: "Bubble centroid $y_c$"
      x: times
      y: [yc]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$y_c$ (non-dim)"
      file: ch13_si_yc.pdf

    - type: time_series
      title: "Volume conservation $|\\Delta V|/V_0$ (log)"
      x: times
      y: [volume_conservation]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: ch13_si_volcons.pdf

    - type: time_series
      title: "Kinetic energy $E_k(t)$"
      x: times
      y: [kinetic_energy]
      labels: ["Simulation"]
      xlabel: "$t$ (non-dim)"
      ylabel: "$E_k$ (non-dim)"
      file: ch13_si_ke.pdf

    - type: snapshot
      title: "$t = 14$ (20 ms)"
      t_idx: 0
      contour: true
      colorbar: true
      file: ch13_si_snap_t0.pdf

    - type: snapshot
      title: "$t = 28$ (40 ms)"
      t_idx: 1
      contour: true
      colorbar: true
      file: ch13_si_snap_t1.pdf

    - type: snapshot
      title: "$t = 42$ (60 ms)"
      t_idx: 2
      contour: true
      colorbar: true
      file: ch13_si_snap_t2.pdf

    - type: snapshot
      title: "$t = 55$ (80 ms)"
      t_idx: 3
      contour: true
      colorbar: true
      file: ch13_si_snap_t3.pdf

    - type: snapshot
      title: "$t = 69$ (100 ms, final)"
      t_idx: -1
      contour: true
      colorbar: true
      file: ch13_si_snap_final.pdf

    - type: velocity_snapshot
      title: "Velocity field $t = 42$ (60 ms)"
      t_idx: 2
      contour: true
      colorbar: true
      file: ch13_si_vel_t2.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [10.0e-3, 10.0e-3]  # 10mm from left/bottom walls = 2R  (-> [2, 2] non-dim)
  radius: 5.0e-3              # 5mm = L_ref  (-> R_nd = 1.0)
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
