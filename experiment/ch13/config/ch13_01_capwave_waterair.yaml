# §13.1 Capillary wave oscillation — physically motivated water/air parameters
#
# Non-dimensionalization: rho_g=1 (air), rho_l=833 (water; 998/1.2~833), sigma=1
# Oh = mu/sqrt(rho_l*sigma*R) = 0.05/sqrt(833*1*0.25) ~ 3.5e-3  (~1mm water drop)
#
# 2D Lamb dispersion relation (n=2):
#   omega_0^2 = n(n^2-1)*sigma / ((rho_l+rho_g)*R^3) = 6/(834*0.015625) = 0.461 => omega_0 = 0.679
#   T_0  = 2*pi/omega_0 ~ 9.26
#   beta = (n^2-1)*mu / ((rho_l+rho_g)*R^2) = 3*0.05/(834*0.0625) = 0.00288
#
# T_final=8.0 ~ 0.86*T_0  (~0.86 periods)
# Method: eikonal_xi reinit + phi_primary_transport + split PPE (GFM)

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.5
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l:  833.0
  rho_g:    1.0
  sigma:    1.0
  mu:       0.05
  g_acc:    0.0

run:
  T_final:     8.0
  cfl:         0.10
  snap_interval: 2.0
  print_every: 1000
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_01_capwave_waterair
  save_npz: true
  figures:
    # D(t) vs 2D Lamb analytical solution
    - type: time_series
      title: "Capillary wave D(t) — water/air (rho=833:1), GFM, alpha=1.5"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      analytical:
        formula: prosperetti
        omega0: 0.679
        beta:   2.88e-3
        D0:     0.05
      file: ch13_capwave_Dt.pdf

    # KE(t) log scale — parasitic current growth
    - type: time_series
      title: "Kinetic energy $E_k(t)$ — parasitic currents at rho=833:1"
      x: times
      y: [kinetic_energy]
      labels: ["$E_k(t)$"]
      xlabel: "$t$"
      ylabel: "Kinetic energy $E_k$"
      yscale: log
      file: ch13_capwave_KE.pdf

    # psi snapshots — droplet shape evolution
    # snap_interval=2.0 => t_idx: 0=initial, 1=t~2, 2=t~4, 3=t~6
    - type: snapshot
      t_idx: 0
      contour: true
      colorbar: true
      title: "$t = 0$ (prolate)"
      file: ch13_capwave_snap_t0.pdf

    - type: snapshot
      t_idx: 1
      contour: true
      colorbar: true
      title: "$t = 2 \\approx T_0/4$ (near circular)"
      file: ch13_capwave_snap_t2.pdf

    - type: snapshot
      t_idx: 2
      contour: true
      colorbar: true
      title: "$t = 4 \\approx T_0/2$ (oblate)"
      file: ch13_capwave_snap_t4.pdf

    - type: snapshot
      t_idx: 3
      contour: true
      colorbar: true
      title: "$t = 6 \\approx 3T_0/4$ (near circular)"
      file: ch13_capwave_snap_t6.pdf

    # Velocity field at final time — parasitic vortex pattern
    - type: velocity_snapshot
      t_idx: -1
      contour: true
      colorbar: true
      title: "$t = 8$: velocity field (parasitic vortex)"
      file: ch13_capwave_vel_final.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
