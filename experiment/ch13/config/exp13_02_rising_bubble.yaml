# §13.3 Single rising bubble — Hysing et al. (2009) Case 1 (modified)
# Reference: Hysing et al. (2009) Re=35, Eo=10
# Physics (modified): ρ_l/ρ_g = 10 (full Case 1 uses 1000)
# Derived: σ = g*(ρ_l−ρ_g)*d² / Eo,  μ = ρ_l*sqrt(g*d)*d / Re

grid:
  NX:  64
  NY: 128
  LX: 1.0
  LY: 2.0
  bc_type: wall
  alpha_grid: 2.0
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l: 10.0
  rho_g:  1.0
  g_acc:  1.0
  # Derived non-dimensional parameters (Re, Eo with d_ref = 0.5)
  Re:     35.0
  Eo:     10.0
  d_ref:   0.5    # bubble diameter
  # Results in: σ ≈ 0.2250, μ ≈ 0.1012

run:
  T_final:    3.0
  cfl:        0.15
  kappa_max:  8.0
  snap_interval: 0.5
  print_every: 200

output:
  dir: results/exp13_02
  save_npz: true
  figures:
    - type: time_series
      title: "Bubble rise velocity v_c(t)"
      x: times
      y: [vc]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "v_c"
      file: rise_velocity.pdf

    - type: time_series
      title: "Bubble centroid y_c(t)"
      x: times
      y: [yc]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "y_c"
      file: centroid.pdf

    - type: time_series
      title: "Volume conservation |ΔV|/V₀"
      x: times
      y: [volume_conservation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "|ΔV|/V₀"
      yscale: log
      file: volume_conservation.pdf

    - type: snapshot
      title: "Rising bubble — t=3.0"
      t_idx: -1
      file: snapshot_final.pdf

    - type: density_snapshot
      title: "Density — t=3.0"
      t_idx: -1
      file: density_final.pdf

    - type: snapshot_series
      field: density
      file_prefix: density_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [0.5, 0.5]
  radius: 0.25
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
