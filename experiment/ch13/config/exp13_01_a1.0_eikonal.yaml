# §13.1 Capillary wave decay — α=1.0, reinit=eikonal (CHK-136)
# EikonalReinitializer: Godunov upwind redistancing + local-ε reconstruction.
# Unified method: replaces split (shape) + DGR (thickness) with single Eikonal PDE.
# Expected: D_final ≈ 0 (correct physics), VolCons < 1%, no mode-2 amplification.
# Ref: split-only D_final=0.0036 ✓ (CHK-135); hybrid D_final=0.227 ✗ (CHK-135).
# Ref: WIKI-T-031 — theory and guarantees.

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    10.0
  max_steps:  500000
  cfl:        0.10
  snap_times: [0.0, 2.5, 5.0, 7.5, 10.0]
  print_every: 500
  reinit_method: eikonal
  reinit_every: 2

output:
  dir: results/exp13_01_a1.0_eikonal
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave α=1.0 eikonal — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L−B)/(L+B)"
      analytical:
        formula: prosperetti
        omega0: 6.824
        beta:   0.048
        D0:     0.05
      file: capillary_a1.0_eikonal.pdf

    - type: snapshot
      title: "α=1.0 eikonal — t=0"
      t_idx: 0
      file: snapshot_t0.pdf

    - type: snapshot
      title: "α=1.0 eikonal — final"
      t_idx: -1
      file: snapshot_final.pdf

    - type: velocity_snapshot
      title: "α=1.0 eikonal — velocity final"
      t_idx: -1
      file: velocity_final.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
