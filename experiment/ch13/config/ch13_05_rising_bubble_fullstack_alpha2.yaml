# CHK-170 probe - single rising bubble, ch13_04 fullstack stack on alpha=2
#
# Base stack: ch13_04_capwave_fullstack_alpha2.yaml.
# Deltas required by the target physics:
#   - vertical water/air bubble domain: LX=1, LY=2, NX=64, NY=128
#   - gas bubble initial condition: circle(center=(0.5, 0.5), radius=0.25)
#   - buoyancy enabled: g_acc=0.001
#   - bubble diagnostics: centroid/rise velocity instead of capillary deformation
#
# Numerical stack inherited from ch13_04:
#   - FCCD flux advection/convection
#   - ridge_eikonal reinitialization
#   - alpha_grid=2.0 interface-fitted stretch
#   - consistent_gfm pressure reproject mode

grid:
  NX: 64
  NY: 128
  LX: 1.0
  LY: 2.0
  bc_type: wall
  alpha_grid: 2.0
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l: 833.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.001

run:
  T_final: 20.0
  cfl: 0.10
  snap_interval: 2.0
  print_every: 1000
  reinit_method: ridge_eikonal
  reinit_every: 2
  reinit_eps_scale: 1.4
  ridge_sigma_0: 3.0
  phi_primary_transport: true
  reproject_mode: consistent_gfm
  advection_scheme: fccd_flux
  convection_scheme: fccd_flux

output:
  dir: results/ch13_05_rising_bubble_fullstack_alpha2
  save_npz: true
  figures:
    - type: time_series
      title: "Bubble rise velocity $v_c(t)$ - FCCD x Ridge-Eikonal x alpha=2"
      x: times
      y: [vc]
      labels: ["Fullstack"]
      xlabel: "$t$"
      ylabel: "$v_c$"
      file: ch13_05_bubble_vc.pdf

    - type: time_series
      title: "Bubble centroid $y_c(t)$ - fullstack alpha=2"
      x: times
      y: [yc]
      labels: ["Fullstack"]
      xlabel: "$t$"
      ylabel: "$y_c$"
      file: ch13_05_bubble_yc.pdf

    - type: time_series
      title: "Volume conservation $|\\Delta V|/V_0$"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: ch13_05_bubble_volcons.pdf

    - type: time_series
      title: "Kinetic energy $E_k(t)$"
      x: times
      y: [kinetic_energy]
      labels: ["Fullstack"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      file: ch13_05_bubble_ke.pdf

    - type: snapshot
      title: "$t=0$"
      t_idx: 0
      contour: true
      colorbar: true
      file: ch13_05_bubble_snap_t00.pdf

    - type: snapshot
      title: "$t=6$"
      t_idx: 3
      contour: true
      colorbar: true
      file: ch13_05_bubble_snap_t06.pdf

    - type: snapshot
      title: "$t=12$"
      t_idx: 6
      contour: true
      colorbar: true
      file: ch13_05_bubble_snap_t12.pdf

    - type: snapshot
      title: "$t=T_{\\mathrm{final}}$"
      t_idx: -1
      contour: true
      colorbar: true
      file: ch13_05_bubble_snap_tf.pdf

    - type: velocity_snapshot
      title: "Velocity field $t=6$"
      t_idx: 3
      contour: true
      colorbar: true
      file: ch13_05_bubble_vel_t06.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [0.5, 0.5]
  radius: 0.25
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
