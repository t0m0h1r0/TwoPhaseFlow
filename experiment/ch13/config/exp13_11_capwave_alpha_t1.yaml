# §13.1 Capillary wave — alpha_grid sweep [1.0, 1.2, 1.5, 2.0], T=1
# eikonal_xi + phi_primary_transport=true (CHK-140 fix)
# NOTE: alpha=2.0 blowup risk (CHK-133: KE 3910x spike)

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    1.0
  cfl:        0.10
  snap_interval: 0.25
  print_every: 200
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true

output:
  dir: results/exp13_11_alpha_t1
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave alpha sweep T=1 — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L−B)/(L+B)"
      analytical:
        formula: prosperetti
        omega0: 6.824
        beta:   0.048
        D0:     0.05
      file: capillary_alpha_sweep.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: density
      file_prefix: density_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall

sweep:
  - label: alpha_1.0
    overrides:
      grid.alpha_grid: 1.0
      grid.use_local_eps: false
  - label: alpha_1.2
    overrides:
      grid.alpha_grid: 1.2
      grid.use_local_eps: true
  - label: alpha_1.5
    overrides:
      grid.alpha_grid: 1.5
      grid.use_local_eps: true
  - label: alpha_2.0
    overrides:
      grid.alpha_grid: 2.0
      grid.use_local_eps: true
