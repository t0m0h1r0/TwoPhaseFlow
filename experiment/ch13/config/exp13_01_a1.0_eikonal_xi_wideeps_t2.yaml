# §13.1 Capillary wave decay — α=1.0, reinit=eikonal_xi, eps_scale=1.4, T=2 (CHK-139)
# T=1 passed: VolCons=0.802% <1% ✓, D(T=1)=0.018 <0.05 ✓
# T=2 target: D(T=2) < 0.05, VolCons < 1%.

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    2.0
  max_steps:  500000
  cfl:        0.10
  snap_times: [0.0, 0.5, 1.0, 1.5, 2.0]
  print_every: 500
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4

output:
  dir: results/exp13_01_a1.0_eikonal_xi_wideeps_t2
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave α=1.0 eikonal_xi wideeps=1.4 T=2 — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L−B)/(L+B)"
      analytical:
        formula: prosperetti
        omega0: 6.824
        beta:   0.048
        D0:     0.05
      file: capillary_a1.0_eikonal_xi_wideeps_t2.pdf

    - type: snapshot
      title: "α=1.0 eikonal_xi wideeps=1.4 — t=0"
      t_idx: 0
      file: snapshot_t0.pdf

    - type: snapshot
      title: "α=1.0 eikonal_xi wideeps=1.4 — final"
      t_idx: -1
      file: snapshot_final.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
