# Short verification run — a1.0, hybrid, T=0.25 (past blowup at t=0.069)
grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0
physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0
run:
  T_final: 0.25
  max_steps: 50000
  cfl: 0.10
  snap_times: [0.0, 0.25]
  print_every: 200
  reinit_method: hybrid
output:
  dir: results/verify_a1.0_hybrid
  save_npz: false
  figures: []
diagnostics:
  - kinetic_energy
initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid
initial_velocity: null
boundary_condition:
  type: wall
