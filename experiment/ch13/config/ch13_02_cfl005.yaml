# §13.2 CFL=0.05 実験 — WIKI-E-030 Exp-3
# base: ch13_02_waterair_bubble.yaml + cfl=0.05（半減）
#
# 目的: ブローアップのステップ数が ≈2× になるか確認（H-15 vs H-16）
# 期待:
#   H-15（線形蓄積）: blowup step ≈ 56k、物理時刻 t ≈ 12.6 と同じ
#   H-16（物理時刻不安定）: blowup step ≈ 56k、物理時刻 t ≈ 12.6 と同じ
#   → 両仮説の区別: H-15 なら step が 2× (Δt半分 → step 2倍で同じ t)
#                  H-16 なら t ≈ 12.6 で blowup（step は 2× になる）
# 注意: H-15 と H-16 は CFL 実験では区別できない（どちらも同じ物理時刻でブローアップ）
#       ただし h15 では KE が step に比例して増加し、h16 では t に比例する

grid:
  NX:  64
  NY: 128
  LX: 1.0
  LY: 2.0
  bc_type: wall
  alpha_grid: 1.5
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l: 833.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.001

run:
  T_final: 20.0
  cfl: 0.05
  snap_interval: 2.0
  print_every: 2000
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_02_cfl005
  save_npz: true
  figures:
    - type: time_series
      title: "KE(t) — CFL=0.05 (half CFL)"
      x: times
      y: [kinetic_energy]
      labels: ["CFL=0.05"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      file: ch13_cfl005_ke.pdf

    - type: time_series
      title: "Bubble centroid $y_c(t)$ — CFL=0.05"
      x: times
      y: [yc]
      labels: ["CFL=0.05"]
      xlabel: "$t$"
      ylabel: "$y_c$"
      file: ch13_cfl005_yc.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - bubble_centroid

initial_condition:
  type: circle
  center: [0.5, 0.5]
  radius: 0.25
  interior_phase: gas

initial_velocity: null

boundary_condition:
  type: wall
