# Set F2: α=1.2, split-only reinit, reinit_every=2 — isolate whether DGR step causes mass injection
# Split reinit is documented as nearly volume-conservative (small mass correction only)
# If VolCons stays small → DGR step is the cause; split-only is safe on non-uniform grids

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.2
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    10.0
  max_steps:  500000
  cfl:        0.10
  snap_times: [0.0, 2.5, 5.0, 7.5, 10.0]
  print_every: 500
  reinit_method: split
  reinit_every: 2

output:
  dir: results/exp13_01_a1.2_f2
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave α=1.2 split-only every-2 — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L−B)/(L+B)"
      analytical:
        formula: prosperetti
        omega0: 6.824
        beta:   0.048
        D0:     0.05
      file: capillary_f2.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
