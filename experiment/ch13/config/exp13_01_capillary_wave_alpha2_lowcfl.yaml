# Probe: alpha=2 no-rebuild with CFL=0.05 (halved)
# Tests H4: whether step-439 blowup is a capillary CFL violation
# If stable → CFL constraint too loose; if still blows → not CFL-related

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 2.0
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    1.0
  max_steps:  50000
  cfl:        0.05
  snap_times: [0.0, 0.5, 1.0]
  print_every: 200

output:
  dir: results/exp13_01_alpha2_lowcfl
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave alpha=2 CFL=0.05 — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L-B)/(L+B)"
      file: capillary_alpha2_lowcfl.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
