# N=128 water-air capillary-flow probe for WIKI-X-020..022 and WIKI-X-029..032.
# Production numerical stack: FCCD PPE + HFE + UCCD6.
# - FCCD: conservative interface transport and pressure gradient use the `fccd`
#   scheme; flux-locus form is the default option for these terms.
# - Surface tension: `pressure_jump` is represented in the PPE, not as CSF σκ∇ψ.
# - HFE: interface curvature uses `psi_direct_hfe`.
# - UCCD6: momentum convection uses `uccd6` per WIKI-T-062 / WIKI-X-028.

grid:
  cells: [128, 128]
  domain:
    size: [1.0, 1.0]
    boundary: wall
  distribution:
    type: interface_fitted
    method: gaussian_levelset
    alpha: 2.0
    schedule: static

interface:
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      method: psi_direct_hfe
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 4
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 1000.0
      mu: 1.0e-3
    gas:
      rho: 1.2
      mu: 1.8e-5
  surface_tension: 0.072
  gravity: 0.0

run:
  time:
    final: 8.0
    cfl: 0.10
    print_every: 100
  debug:
    step_diagnostics: false

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: psi
      spatial: fccd
      time_integrator: tvd_rk3
  momentum:
    terms:
      convection:
        spatial: uccd6
        time_integrator: ab2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: crank_nicolson
      surface_tension:
        formulation: pressure_jump
  projection:
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: jump_decomposition
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 3
          tolerance: 1.0e-8
          relaxation: 1.0
        base_solver:
          kind: iterative
          method: gmres
          tolerance: 1.0e-6
          max_iterations: 500
          restart: 80
          preconditioner: jacobi

output:
  dir: results/ch13_capillary_water_air_alpha2_n128_t8
  save_npz: true
  snapshots:
    interval: 0.5
  figures:
    - type: time_series
      title: "Water-air capillary flow: deformation"
      x: times
      y: [deformation]
      labels: ["D(t)"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      file: deformation.pdf

    - type: time_series
      title: "Water-air capillary flow: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air capillary flow: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, deformation]

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null
boundary_condition:
  type: wall
