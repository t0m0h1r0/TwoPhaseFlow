# N=128 water-air capillary-flow probe for WIKI-X-020/021/022.

grid:
  cells: [128, 128]
  domain:
    size: [1.0, 1.0]
    boundary: wall
  distribution:
    type: interface_fitted
    method: gaussian_levelset
    alpha: 2.0
    schedule: static

interface:
  thickness:
    mode: local
    base_factor: 1.5
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 2
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 833.0
      mu: 0.05
    gas:
      rho: 1.0
      mu: 0.05
  surface_tension: 1.0
  gravity: 0.0

run:
  time:
    final: 0.10
    cfl: 0.10
    print_every: 20
  debug:
    step_diagnostics: false

numerics:
  physical_time:
    interface_advection:
      spatial: fccd_flux
      time: explicit
      tracking:
        enabled: true
        primary: phi
        redist_every: 4
        clip_factor: 12.0
        heaviside_eps_scale: 1.0
    momentum:
      form: primitive_velocity
      convection:
        spatial: fccd_flux
        time: explicit
      viscosity:
        spatial: ccd
        time: explicit
      capillary_force:
        model: csf
        time: explicit
        curvature: psi_direct_hfe
        force_gradient: projection_consistent
  elliptic:
    pressure_projection:
      mode: consistent_gfm
      poisson:
        discretization: fvm
        solver:
          kind: iterative
          method: gmres
          tolerance: 1.0e-8
          max_iterations: 500
          restart: 80
          preconditioner: line_pcr
          pcr_stages: 4
          c_tau: 2.0

output:
  dir: results/ch13_capillary_water_air_alpha2_n128
  save_npz: true
  snapshots:
    interval: 0.01
  figures:
    - type: time_series
      title: "Water-air capillary flow: deformation"
      x: times
      y: [deformation]
      labels: ["D(t)"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      file: deformation.pdf

    - type: time_series
      title: "Water-air capillary flow: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air capillary flow: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, deformation]

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null
boundary_condition:
  type: wall
