# CHK-177: 水-空気毛管波 N=128 UCCD6 対流 (WIKI-X-023)
# Base: ch13_06_capwave_waterair_n128.yaml
# Variant: convection_scheme=uccd6 (skew-sym CCD + selective hyperviscosity)
# Purpose: measure late-time BF-residual H-01 impact of UCCD6 on NS velocity.

grid:
  NX: 128
  NY: 128
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 2.0
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l: 1000.0
  rho_g: 1.2
  sigma: 0.072
  mu: 1.0e-3
  g_acc: 0.0

run:
  T_final: 90.0
  cfl: 0.10
  snap_interval: 9.0
  print_every: 1000
  reinit_method: ridge_eikonal
  reinit_every: 2
  reinit_eps_scale: 1.4
  ridge_sigma_0: 3.0
  phi_primary_transport: true
  reproject_mode: consistent_gfm
  # Per-term discretisation schemes (WIKI-X-023 NS decomposition map).
  advection_scheme: fccd_flux        # ψ (CLS): FCCD (unchanged baseline)
  convection_scheme: uccd6           # u·∇u : UCCD6 — skew-sym + hyperviscosity
  uccd6_sigma: 1.0e-3                # σ ≲ √3 h / (8500 max|u|) for RK3 stability
  pressure_scheme: fvm_spsolve       # PPE
  surface_tension_scheme: csf        # σκ∇ψ

output:
  dir: results/ch13_06_capwave_waterair_n128_uccd6
  save_npz: true
  figures:
    - time_series: "deformation (Prosperetti: omega0=0.192, beta=5.9e-5, D0=0.05)"
    - time_series: volume_conservation
    - snapshot: t_idx=0
    - snapshot: t_idx=-1

diagnostics: [volume_conservation, kinetic_energy, deformation]

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null
boundary_condition: {type: wall}
