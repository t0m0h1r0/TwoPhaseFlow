# §3.1 Capillary wave — water/air physical parameters, GFM, alpha=1.5, T=8 (~0.86 period)
# Non-dimensionalization: rho_g=1 (air), rho_l=833 (water), sigma=1
# Oh = mu/sqrt(rho_l*sigma*R) = 0.05/sqrt(833*1*0.25) = 3.46e-3 ~ real water at ~1mm
# 2D Lamb: omega0 = sqrt(n(n^2-1)*sigma/((rho_l+rho_g)*R^3)) = sqrt(6/(834*0.015625)) = 0.679
# period T0 = 2*pi/omega0 ~ 9.26
# beta_2D = (n^2-1)*mu/((rho_l+rho_g)*R^2) = 3*0.05/(834*0.0625) = 0.00288

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.5
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l:  833.0
  rho_g:    1.0
  sigma:    1.0
  mu:       0.05
  g_acc:    0.0

run:
  T_final:     8.0
  cfl:        0.10
  snap_interval: 2.0
  print_every: 1000
  reinit_method: eikonal_xi
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/exp13_17_waterair_gfm
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave — water/air (ρ=833:1), GFM, α=1.5 — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L−B)/(L+B)"
      analytical:
        formula: prosperetti
        omega0: 0.679
        beta:   2.88e-3
        D0:     0.05
      file: capillary_waterair_gfm.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: density
      file_prefix: density_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
