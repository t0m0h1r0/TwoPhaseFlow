# CHK-161 symmetry binary-search A — uniform grid + Ridge-Eikonal reinit.
# Isolates Ridge-Eikonal as the asymmetry source by removing grid stretching.
# If y-flip error > 1e-10 here → Ridge itself is asymmetric even on uniform grid.

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0          # ← A: uniform grid (was 2.0)
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l:  833.0
  rho_g:    1.0
  sigma:    1.0
  mu:       0.05
  g_acc:    0.0

run:
  T_final:     8.0
  cfl:         0.10
  snap_interval: 2.0
  print_every: 1000
  reinit_method: ridge_eikonal
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_04_sym_A_uniform_ridge
  save_npz: true
  figures:
    - type: time_series
      title: "A: uniform α=1 + Ridge-Eikonal — symmetry audit"
      x: times
      y: [sym_psi_y, sym_psi_x]
      labels: ["y-flip", "x-flip"]
      xlabel: "$t$"
      ylabel: "$\\|\\psi - \\mathrm{flip}\\|_\\infty / \\max|\\psi|$"
      yscale: log
      file: ch13_04_sym_A_psi.pdf

    - type: snapshot
      t_idx: -1
      contour: true
      colorbar: true
      title: "A: $t=T_{\\mathrm{final}}$"
      file: ch13_04_sym_A_snap_tf.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - symmetry_error

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null
boundary_condition:
  type: wall
