# Probe: short capillary wave (200 steps) to check stability
# before committing to the full T=10.0 run

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 2.0
  use_local_eps: true
  grid_rebuild_freq: 20

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    1.0
  max_steps:  200
  cfl:        0.10
  snap_times: [0.0, 0.5, 1.0]
  print_every: 10

output:
  dir: results/exp13_01_probe
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave probe — D(t)"
      x: times
      y: [deformation]
      labels: ["Simulation"]
      xlabel: "t"
      ylabel: "D = (L-B)/(L+B)"
      file: capillary_probe.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
