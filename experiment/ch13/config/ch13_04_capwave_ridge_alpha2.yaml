# CHK-159 V4 probe — capillary-wave oscillation, Ridge-Eikonal reinit on α=2
#
# Plan:  /Users/tomohiro/.claude/plans/execute-researcharchitect-precious-plum.md
# Theory: SP-E §5 (ε-widening on non-uniform grids), WIKI-T-057/T-058/T-059.
# Goal:  |ΔV/V| < 5% over ~0.86 Lamb periods on an α=2 interface-fitted grid.
# Baseline reference: ch13_01_capwave_waterair.yaml (α=1.5, eikonal_xi).
#
# ─────────────────────────────────────────────────────────────────────
# DEPRECATED for σ>0 + α>1 (CHK-169)
# ─────────────────────────────────────────────────────────────────────
# This non-FCCD path blows up at t≈2.85 (KE exponential runaway) due to
# H-01 CCD/G^adj metric-mismatch BF residual — confirmed WIKI-E-030 Exp-1
# pattern, amplified by α=2 stretching.
#
# Production reference: ch13_04_capwave_fullstack_alpha2.yaml
#   (FCCD advection + convection, PASS all gates to T=8.0 per CHK-160).
#
# This config is preserved for the CHK-167 y-flip symmetry regression
# (sym_psi_y ≤ 2.5e-15 at t=0.5); do NOT use as a reference for
# long-time capillary-wave physics.
# ─────────────────────────────────────────────────────────────────────

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 2.0
  use_local_eps: true
  grid_rebuild_freq: 0

physics:
  rho_l:  833.0
  rho_g:    1.0
  sigma:    1.0
  mu:       0.05
  g_acc:    0.0

run:
  T_final:     8.0
  cfl:         0.10
  snap_interval: 2.0
  print_every: 1000
  reinit_method: ridge_eikonal
  reinit_every: 2
  reinit_eps_scale: 1.4
  phi_primary_transport: true
  reproject_mode: consistent_gfm

output:
  dir: results/ch13_04_capwave_ridge_alpha2
  save_npz: true
  figures:
    - type: time_series
      title: "Capillary wave D(t) — Ridge-Eikonal, α=2 stretched"
      x: times
      y: [deformation]
      labels: ["Ridge-Eikonal"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      analytical:
        formula: prosperetti
        omega0: 0.679
        beta:   2.88e-3
        D0:     0.05
      file: ch13_04_capwave_Dt.pdf

    - type: time_series
      title: "Volume drift — Ridge-Eikonal α=2 (target |ΔV/V| < 5%)"
      x: times
      y: [volume_conservation]
      labels: ["$|ΔV/V|(t)$"]
      xlabel: "$t$"
      ylabel: "$|ΔV/V|$"
      file: ch13_04_capwave_vol.pdf

    - type: snapshot
      t_idx: 0
      contour: true
      colorbar: true
      title: "$t=0$ (prolate)"
      file: ch13_04_capwave_snap_t0.pdf

    - type: snapshot
      t_idx: -1
      contour: true
      colorbar: true
      title: "$t=T_{\\mathrm{final}}$"
      file: ch13_04_capwave_snap_tf.pdf

    - type: time_series
      title: "Symmetry error — ψ flip (CHK-161 y-flip audit)"
      x: times
      y: [sym_psi_y, sym_psi_x]
      labels: ["y-flip (up-down)", "x-flip (left-right)"]
      xlabel: "$t$"
      ylabel: "$\\|\\psi - \\mathrm{flip}(\\psi)\\|_\\infty / \\max|\\psi|$"
      yscale: log
      file: ch13_04_capwave_sym.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation
  - symmetry_error

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
