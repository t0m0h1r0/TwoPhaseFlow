# CHK-176: water-air capillary wave, N=128.
# Scheme policy: WIKI-T-065 / WIKI-X-029..032, with WIKI-X-020..022 stack.

grid:
  cells: [128, 128]
  domain:
    size: [1.0, 1.0]
    boundary: wall
  distribution:
    type: interface_fitted
    method: gaussian_levelset
    alpha: 2.0
    schedule: static

interface:
  thickness:
    mode: local
    base_factor: 1.5
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 2
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 1000.0
      mu: 1.0e-3
    gas:
      rho: 1.2
      mu: 1.8e-5
  surface_tension: 0.072
  gravity: 0.0

run:
  time:
    final: 90.0
    cfl: 0.10
    print_every: 1000

numerics:
  time:
    default_integrator: forward_euler
  interface:
    transport:
      variable: psi
      spatial: fccd_flux
      time_integrator: forward_euler
    tracking:
      enabled: true
      primary: psi
  momentum:
    form: primitive_velocity
    terms:
      convection:
        spatial: fccd_flux
        time_integrator: forward_euler
      pressure:
        gradient: projection_consistent
        balanced_with: surface_tension
      viscosity:
        spatial: ccd
        time_integrator: crank_nicolson
      surface_tension:
        enabled: true
        model: csf
        time_integrator: forward_euler
        curvature: psi_direct_hfe
        gradient: projection_consistent
        balanced_with: pressure
      gravity:
        enabled: false
  projection:
    mode: consistent_iim
    poisson:
      operator:
        discretization: fvm
        coefficient: variable_density
      solver:
        kind: iterative
        method: gmres
        tolerance: 1.0e-8
        max_iterations: 500
        restart: 80
        preconditioner: line_pcr
        pcr_stages: 1
        c_tau: 2.0

output:
  dir: results/ch13_06_capwave_waterair_n128
  save_npz: true
  snapshots:
    interval: 9.0
  figures:
    - type: time_series
      title: "Water-air capillary wave: deformation"
      y: [deformation]
      labels: ["D(t)"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      analytical:
        formula: prosperetti
        omega0: 0.192
        beta: 5.9e-5
        D0: 0.05
      file: deformation.pdf

    - type: time_series
      title: "Water-air capillary wave: volume drift"
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, deformation]

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null
boundary_condition:
  type: wall
