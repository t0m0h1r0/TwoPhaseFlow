# §13.1 DGR diagnostics — short run to capture blowup (a1.0_dgr blows up at step 174)
grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.0
  use_local_eps: false
  grid_rebuild_freq: 0

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    0.10
  max_steps:  200
  cfl:        0.10
  snap_times: [0.0]
  print_every: 20
  reinit_every: 2
  reinit_method: dgr

output:
  dir: results/diag_dgr_instrumented
  save_npz: false
  figures: []

diagnostics:
  - kinetic_energy

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
