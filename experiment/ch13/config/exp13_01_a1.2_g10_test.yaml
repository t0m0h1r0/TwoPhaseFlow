# Quick test: α=1.2, grid_rebuild_freq=10, T=0.2, print_every=10
# Just verifies grid rebuild doesn't hang; check KE and VolCons at step 10-20

grid:
  NX: 64
  NY: 64
  LX: 1.0
  LY: 1.0
  bc_type: wall
  alpha_grid: 1.2
  use_local_eps: true
  grid_rebuild_freq: 10

physics:
  rho_l:  10.0
  rho_g:   1.0
  sigma:   1.0
  mu:      0.05
  g_acc:   0.0

run:
  T_final:    0.2
  max_steps:  500
  cfl:        0.10
  snap_times: [0.0, 0.2]
  print_every: 10
  reinit_method: hybrid
  reinit_every: 2

output:
  dir: results/exp13_01_a1.2_g10_test
  save_npz: true
  figures: []

diagnostics:
  - volume_conservation
  - kinetic_energy
  - deformation

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.05
  mode: 2
  interior_phase: liquid

initial_velocity: null

boundary_condition:
  type: wall
