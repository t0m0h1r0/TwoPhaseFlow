# New PhaseRegion-primary capillary graph route.
#
# This file name is intentionally the canonical capillary entry point.  It does
# not invoke experiment/run.py.  It is consumed by
# experiment/ch14/diagnose_phase_region_capillary_graph_steps.py, whose route
# is:
#
#   eta -> q_l = Q_h(eta)
#   q_g = |C| - q_l
#   PhaseRegionBatch(GAS_ABOVE graph)
#   E_h second-variation modal step
#
# The legacy production-runtime config supplies only the physical SI parameters,
# grid, and initial graph for this reduced route.  The canonical route,
# run length, and paper-facing output contract live in this file.

base_config: legacy/ch14_capillary_legacy_runtime.yaml

experiment:
  type: phase_region_capillary_graph

grid:
  cells: [32, 32]
  domain:
    size: [0.02, 0.02]
    boundary:
      x: periodic
      y:
        lower: wall
        upper: wall
  distribution:
    schedule: 1
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
          wall:
            alpha: 1.3
            eps_g_cells: 4
            apply_to: [lower, upper]

interface:
  state_space: active_geometry_capillary
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      # Retained for the phi diagnostic view; the PhaseRegion graph route does
      # not use diffuse curvature as its capillary force.
      method: face_implicit
  reinitialization:
    algorithm: compatibility_projection
    schedule:
      every_steps: 1
    profile:
      eps_scale: 1.0
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 998.2
      mu: 1.002e-3
    gas:
      rho: 1.204
      mu: 1.825e-5
  surface_tension: 0.0728
  gravity: 0.0

run:
  momentum_form: conservative_common_flux
  time:
    final: 0.046742983863
    cfl: 1.0
    print_every: 200
  debug:
    step_diagnostics: false

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: q
      spatial: geometric_swept_volume
      time_integrator: tvd_rk3
      boundedness: certified
      fail_close: true
    tracking:
      primary: q
      gauge_reconstruction: column_height_graph
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: none
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        gradient: none
        formulation: pressure_jump
        source: bundle_virtual_work
        closed_interface:
          endpoint: column_height_graph
          residual_contract:
            metric: pressure_adjoint
            constraints: [cell_volume]
            fail_close: true
  projection:
    mode: face_hodge
    active_geometry:
      solver:
        scheme: pcg
        convergence:
          norm: linf
          absolute_tolerance: 1.0e-11
          relative_tolerance: 0.0
          max_iterations: 128
        pcg:
          tolerance: 1.0e-13
          max_iterations: 512
          roundoff_floor: 1.0e-15
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    face_no_slip_boundary_state: false
    preserve_projected_faces: true
    boundary_hodge:
      # Capillary-wave reference dispersion assumes impermeable free-slip
      # rigid walls, so the face state keeps wall-normal flux constrained but
      # does not impose a no-slip tangential wall trace.
      mode: off
      state_space: impermeable_face
      wall_trace: reconstruct_nodes
      wall_retraction: metric_projection
      metric: transported_face_mass
      pressure_pairing: restricted_variational_adjoint
      solver: matrix_free_cg
      tolerance: 1.0e-10
      max_iterations: 80
      gate: diagnostic
    pressure_history:
      form: pressure_coordinate
      extrapolation: constant
      reaction: variational_adjoint
      metric: transported_face_mass
      range_gate: fail_close
      work_gate: fail_close
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_reaction_projection: pressure_component_hodge
      solver:
        kind: defect_correction
        corrections:
          # Safety cap only: convergence is still judged by the high-order
          # FCCD residual. The moving nonuniform grid widens the L_L^{-1}L_H
          # spectrum, so the cap must not preempt the residual criterion.
          max_iterations: 512
          tolerance: 1.0e-8
          relaxation: 0.7
          fail_close: true
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/diagnose_phase_region_capillary_graph_steps
  save_npz: true
  snapshots:
    times: [0.0, 0.011685745966, 0.023371491932, 0.035057237897, 0.046742983863]
  figures:
    - type: time_series
      title: "Water-air capillary wave: signed mode amplitude"
      x: times
      y: [signed_interface_amplitude]
      labels: ["$a_2(t)$"]
      xlabel: "$t$"
      ylabel: "$a_2(t)$"
      file: signed_interface_amplitude.pdf

    - type: time_series
      title: "Water-air capillary flow: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air capillary flow: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: phi
      shared_scale: true
      symmetric_scale: true
      color_scale: max
      colorbar_label: "$\\phi$"
      x_ticks: [0.0, 0.005, 0.010, 0.015, 0.020]
      y_ticks: [0.0, 0.005, 0.010, 0.015, 0.020]
      file_prefix: phi_t

    - type: snapshot_series
      field: velocity
      shared_scale: true
      show_field: false
      color_quantity: speed
      color_scale: max
      colorbar_label: "$|u|$"
      vector_cmap: viridis
      background_color: "#eeeeee"
      normalize_arrows: false
      quiver_length_fraction: 0.14
      quiver_min_speed_fraction: 0.02
      quiver_width: 0.0055
      quiver_outline_width_factor: 2.1
      arrow_color: null
      arrow_outline_color: "#ffffff"
      arrow_alpha: 1.0
      arrow_outline_alpha: 0.9
      x_ticks: [0.0, 0.005, 0.010, 0.015, 0.020]
      y_ticks: [0.0, 0.005, 0.010, 0.015, 0.020]
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      pressure_reference: mean
      shared_scale: true
      symmetric_scale: true
      color_scale: robust
      color_vmax_percentile: 99.0
      colorbar_label: "$p - \\langle p \\rangle$"
      x_ticks: [0.0, 0.005, 0.010, 0.015, 0.020]
      y_ticks: [0.0, 0.005, 0.010, 0.015, 0.020]
      file_prefix: pressure_t

    - type: phase_region_graph_summary
      file: phase_region_capillary_graph_steps.pdf
    - type: phase_region_graph_snapshot_series
      fields: [q_l, q_g]
      file: phase_region_capillary_graph_yaml_snapshots.pdf

diagnostics:
  - volume_conservation
  - kinetic_energy
  - interface_amplitude
  - type: signed_interface_amplitude
    mode: 2
    length: 0.02
    phase: 0.0

initial_condition:
  background_phase: gas
  objects:
    - type: capillary_wave
      axis: y
      mean: 0.01
      amplitude: 0.0002
      mode: 2
      length: 0.02
      phase: 0.0
      interior_phase: liquid

initial_velocity: null
boundary_condition:
  type: free_slip

phase_region_graph:
  owner: gas_above
  chart: graph_periodic
  q_measurement: exact_graph_column_integral
  phase_owner_map: exact_complement
  energy: graph_perimeter_second_variation
  dynamics: velocity_verlet_linear_capillary_mode
  pressure_velocity: not_connected
  force_admissible: false
  backend:
    use_gpu: true
