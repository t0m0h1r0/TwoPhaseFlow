# N=32 water-air capillary-flow one-period benchmark for §14.
# SI scale: 20 mm x 20 mm tank, mode-2 wavelength lambda=10 mm,
# and initial amplitude A0=0.2 mm.  With water-air properties at about
# 20 C (rho_l=998.2, rho_g=1.204, sigma=0.0728), k=628.318530718 and
# h_l=h_g=10 mm.  The rigid-wall two-layer dispersion relation gives
# omega=sqrt(sigma*k^3/(rho_l*coth(k*h_l)+rho_g*coth(k*h_g)))
#      =134.419859151, so T=0.046742983863 s.
# Production numerical stack: FCCD PPE + face-native Young-Laplace jump + UCCD6.
# - FCCD: conservative interface transport and pressure gradient use the `fccd`
#   scheme; flux-locus form is the default option for these terms.
# - Surface tension: `pressure_jump` enters as an affine interface-stress
#   closure, not as CSF σκ∇ψ or a regular pressure field.
# - Curvature: interface geometry uses the scalar face-native Young-Laplace
#   pressure jump.  The P2 ALE discrete-gradient face-cochain route is not a
#   validated production pressure-jump path.
# - UCCD6: momentum convection uses `uccd6` per WIKI-T-062 / WIKI-X-028.
# - Grid fitting: both tensor-product axes carry the interface monitor; the
#   y axis additionally carries wall refinement for the physical upper/lower
#   walls. The fitted grid is rebuilt every step from the current tracked ψ.

experiment:
  type: capillary_wave

grid:
  cells: [32, 32]
  domain:
    size: [0.02, 0.02]
    boundary:
      x: periodic
      y:
        lower: wall
        upper: wall
  distribution:
    schedule: 1
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
          wall:
            alpha: 1.3
            eps_g_cells: 4
            apply_to: [lower, upper]

interface:
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      # Scalar face-native Young-Laplace jump; the invalid P2 ALE face-cochain
      # route is fail-closed for pressure-jump production configs.
      method: face_implicit
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 1
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 998.2
      mu: 1.002e-3
    gas:
      rho: 1.204
      mu: 1.825e-5
  surface_tension: 0.0728
  gravity: 0.0

run:
  momentum_form: conservative_common_flux
  time:
    final: 0.046742983863
    # Multiplier on theory CFL constants; 1.0 uses the theory budget.
    cfl: 1.0
    print_every: 200
  debug:
    step_diagnostics: false

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: psi
      spatial: fccd
      time_integrator: tvd_rk3
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: none
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        formulation: pressure_jump
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    preserve_projected_faces: true
    boundary_hodge:
      # SP-AN state-space contract shared by ch14 production YAMLs.  The
      # production restricted solve remains off; for x-periodic/y-wall runs
      # this records the quotient-compatible wall face space explicitly.
      mode: off
      state_space: constrained_face
      wall_trace: reconstruct_nodes
      wall_retraction: metric_projection
      metric: transported_face_mass
      pressure_pairing: restricted_variational_adjoint
      solver: matrix_free_cg
      tolerance: 1.0e-10
      max_iterations: 80
      gate: diagnostic
    pressure_history:
      form: pressure_coordinate
      extrapolation: bdf2
      reaction: variational_adjoint
      metric: transported_face_mass
      range_gate: fail_close
      work_gate: fail_close
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_range_projection: component_hodge_augmented
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 12
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_capillary
  save_npz: true
  snapshots:
    times: [0.0, 0.011685745966, 0.023371491932, 0.035057237897, 0.046742983863]
  figures:
    - type: time_series
      title: "Water-air capillary wave: signed mode amplitude"
      x: times
      y: [signed_interface_amplitude]
      labels: ["$a_2(t)$"]
      xlabel: "$t$"
      ylabel: "$a_2(t)$"
      file: signed_interface_amplitude.pdf

    - type: time_series
      title: "Water-air capillary flow: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air capillary flow: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      shared_scale: true
      show_field: false
      color_quantity: speed
      color_scale: max
      colorbar_label: "$|u|$"
      vector_cmap: viridis
      background_color: "#eeeeee"
      normalize_arrows: false
      quiver_length_fraction: 0.14
      quiver_min_speed_fraction: 0.02
      quiver_width: 0.0055
      quiver_outline_width_factor: 2.1
      arrow_color: null
      arrow_outline_color: "#ffffff"
      arrow_alpha: 1.0
      arrow_outline_alpha: 0.9
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure_hodge
      shared_scale: true
      symmetric_scale: true
      file_prefix: pressure_t

diagnostics:
  - volume_conservation
  - kinetic_energy
  - interface_amplitude
  - type: signed_interface_amplitude
    mode: 2
    length: 0.02
    phase: 0.0

initial_condition:
  background_phase: gas
  objects:
    - type: capillary_wave
      axis: y
      mean: 0.01
      amplitude: 0.0002
      mode: 2
      length: 0.02
      phase: 0.0
      interior_phase: liquid

initial_velocity: null
boundary_condition:
  type: wall
