# Water-air rising-bubble probe in a 10 mm x 20 mm tank, derived from the
# capillary alpha=2 stack.  The checked-in grid is the chapter-14 N=32x64
# paper/probe grid; resolution studies should override only `grid.cells`.
# Production numerical stack: conservative common-flux FCCD transport +
# variational pressure + closed-interface Riesz capillary reaction +
# direct-ψ filtered curvature + UCCD6.
# - FCCD: conservative interface transport and pressure gradient use the `fccd`
#   scheme; flux-locus form is the default option for these terms.
# - Surface tension: `pressure_jump` enters as an affine interface-stress
#   closure, not as CSF σκ∇ψ or a regular pressure field.
# - Curvature: interface geometry uses the scalar face-native Young-Laplace
#   pressure jump.  The P2 ALE discrete-gradient face-cochain route is not a
#   validated production pressure-jump path.
# - Pressure force: the projection corrector uses the pressure-adjoint
#   variational face reaction, not the raw compact gradient representative.
# - Capillary reaction: closed-interface Riesz constructs the surface-energy
#   virtual-work cochain and projects component-volume reactions in the same
#   pressure-adjoint metric as the oscillating-droplet benchmark.
# - Common flux: ψ, density, and momentum use the same stage flux ledger.
#   Until a conservative q/momentum redistance and grid-remap retraction is
#   available, q-only reinitialization and dynamic grid rebuilds are disabled.
# - UCCD6: momentum convection uses `uccd6` per WIKI-T-062 / WIKI-X-028.

experiment:
  type: circle

grid:
  cells: [32, 64]
  domain:
    size: [0.01, 0.02]
    boundary:
      x: periodic
      y:
        lower: wall
        upper: wall
  distribution:
    schedule: 0
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0

interface:
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      # Scalar face-native Young-Laplace jump; the invalid P2 ALE face-cochain
      # route is fail-closed for pressure-jump production configs.
      method: face_implicit
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 0
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0
      volume_constraint: sharp_phase_volume

physics:
  phases:
    liquid:
      rho: 1000.0
      mu: 1.0e-3
    gas:
      rho: 1.2
      mu: 1.8e-5
  surface_tension: 0.072
  gravity: 9.81

run:
  momentum_form: conservative_common_flux
  time:
    final: 0.05
    # Multiplier on theory CFL constants; 1.0 uses the theory budget.
    cfl: 1.0
    print_every: 10
  debug:
    step_diagnostics: true

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: psi
      spatial: fccd
      time_integrator: tvd_rk3
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: none
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      gravity:
        formulation: variational_potential
        transport_adjoint: common_flux
        metric: transported_face_mass
        hodge_gate: fail_close
        work_gate: diagnostic
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        formulation: pressure_jump
        source: closed_interface_riesz
        closed_interface:
          endpoint: conservative_psi
          residual_contract:
            metric: pressure_adjoint
            constraints: [component_volume]
            fail_close: true
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    preserve_projected_faces: true
    boundary_hodge:
      # SP-AN state-space route: keep the production solver off until the
      # restricted operator D_h P_w G_A passes S1--S8, but make the YAML
      # contract explicit and reproducible.
      mode: off
      state_space: constrained_face
      wall_trace: reconstruct_nodes
      wall_retraction: metric_projection
      metric: transported_face_mass
      pressure_pairing: restricted_variational_adjoint
      solver: matrix_free_cg
      tolerance: 1.0e-10
      max_iterations: 80
      gate: diagnostic
    pressure_history:
      form: pressure_coordinate
      extrapolation: bdf2
      reaction: variational_adjoint
      metric: transported_face_mass
      range_gate: fail_close
      work_gate: fail_close
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_reaction_projection: pressure_component_hodge
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 12
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_rising_bubble
  save_npz: true
  checkpoints:
    interval: 0.005
  snapshots:
    interval: 0.005
    times: [0.0, 0.005, 0.01, 0.015, 0.02, 0.025, 0.03]
  figures:
    - type: time_series
      title: "Water-air rising bubble: centroid height"
      x: times
      y: [yc]
      labels: ["$y_c(t)$"]
      xlabel: "$t$"
      ylabel: "$y_c$"
      file: bubble_centroid_y.pdf

    - type: time_series
      title: "Water-air rising bubble: mean rise velocity"
      x: times
      y: [mean_rise_velocity]
      labels: ["$\\bar{v}_g(t)$"]
      xlabel: "$t$"
      ylabel: "$\\bar{v}_g$"
      file: mean_rise_velocity.pdf

    - type: time_series
      title: "Water-air rising bubble: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air rising bubble: deformation"
      x: times
      y: [deformation]
      labels: ["$D(t)$"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      file: deformation.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      shared_scale: true
      show_field: false
      color_quantity: speed
      color_scale: max
      colorbar_label: "$|u|$"
      vector_cmap: viridis
      background_color: "#eeeeee"
      normalize_arrows: false
      quiver_length_fraction: 0.14
      quiver_min_speed_fraction: 0.02
      quiver_width: 0.0055
      quiver_outline_width_factor: 2.1
      arrow_color: null
      arrow_outline_color: "#ffffff"
      arrow_alpha: 1.0
      arrow_outline_alpha: 0.9
      file_prefix: velocity_t

    # The affine jump face cochain is not always integrable as a scalar Hodge
    # representative for this bubble case; plot the stored scalar pressure as
    # a gauge field rather than relabeling a nonintegrable cochain.
    - type: snapshot_series
      field: pressure
      shared_scale: true
      symmetric_scale: true
      file_prefix: pressure_t

diagnostics: [volume_conservation, bubble_centroid, mean_rise_velocity, deformation]

initial_condition:
  background_phase: liquid
  objects:
    - type: circle
      center: [0.005, 0.005]
      radius: 0.0025
      interior_phase: gas

initial_velocity: null
boundary_condition:
  type: wall
