# Rayleigh-Lamb n=2 oscillating droplet benchmark on the ch14 base stack.
# SI scale: 20 mm x 20 mm tank with a 10 mm-class droplet.
# The true ellipse uses semi-axes a=5.5 mm, b=4.5 mm. With water-air
# properties at about 20 C (rho_l=998.2, rho_g=1.204, sigma=0.0728),
# the area-equivalent radius sqrt(ab)=4.974937 mm gives
# omega0=59.578473371 and T=0.105460663082 s.

experiment:
  type: ellipse

grid:
  cells: [32, 32]
  domain:
    size: [0.02, 0.02]
    boundary: periodic
  distribution:
    schedule: 1
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0

interface:
  state_space: active_geometry_capillary
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      # Scalar face-native Young-Laplace jump; the invalid P2 ALE face-cochain
      # route is fail-closed for pressure-jump production configs.
      method: face_implicit
  reinitialization:
    algorithm: none
    schedule:
      every_steps: 0
    profile:
      eps_scale: 1.0
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 998.2
      mu: 1.002e-3
    gas:
      rho: 1.204
      mu: 1.825e-5
  surface_tension: 0.0728
  gravity: 0.0

run:
  momentum_form: conservative_common_flux
  time:
    final: 0.105460663082
    # Multiplier on theory CFL constants; 1.0 uses the §7 CFL budget.
    cfl: 1.0
    print_every: 200
  debug:
    step_diagnostics: false

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: q
      spatial: geometric_swept_volume
      time_integrator: tvd_rk3
      boundedness: certified
      fail_close: true
    tracking:
      primary: q
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: none
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        gradient: none
        formulation: pressure_jump
        source: bundle_virtual_work
        closed_interface:
          endpoint: geometric_cell_fraction
          residual_contract:
            metric: pressure_adjoint
            constraints: [cell_volume]
            fail_close: true
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    preserve_projected_faces: true
    boundary_hodge:
      # SP-AN state-space contract shared by ch14 production YAMLs.  The
      # production restricted solve remains off; diagnostics still parse the
      # same wall/quotient face space if this periodic case is later changed
      # to a wall-bounded domain.
      mode: off
      state_space: constrained_face
      wall_trace: reconstruct_nodes
      wall_retraction: metric_projection
      metric: transported_face_mass
      pressure_pairing: restricted_variational_adjoint
      solver: matrix_free_cg
      tolerance: 1.0e-10
      max_iterations: 80
      gate: diagnostic
    pressure_history:
      form: pressure_coordinate
      extrapolation: bdf2
      reaction: variational_adjoint
      metric: transported_face_mass
      range_gate: fail_close
      work_gate: fail_close
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_reaction_projection: pressure_component_hodge
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 12
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_oscillating_droplet
  save_npz: true
  snapshots:
    times: [0.0, 0.026365165771, 0.052730331541, 0.079095497312, 0.105460663082]
  figures:
    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet: signed deformation"
      x: times
      y: [signed_deformation]
      labels: ["simulation"]
      xlabel: "$t$"
      ylabel: "$D_s(t)$"
      analytical:
        formula: prosperetti
        omega0: 59.578473371
        beta: 0.0
        D0: 0.10
      file: signed_deformation.pdf

    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      shared_scale: true
      show_field: false
      color_quantity: speed
      color_scale: max
      colorbar_label: "$|u|$"
      vector_cmap: viridis
      background_color: "#eeeeee"
      normalize_arrows: false
      quiver_length_fraction: 0.14
      quiver_min_speed_fraction: 0.02
      quiver_width: 0.0055
      quiver_outline_width_factor: 2.1
      arrow_color: null
      arrow_outline_color: "#ffffff"
      arrow_alpha: 1.0
      arrow_outline_alpha: 0.9
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      shared_scale: true
      symmetric_scale: true
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, signed_deformation]

initial_condition:
  background_phase: gas
  objects:
    - type: ellipse
      center: [0.01, 0.01]
      semi_axes: [0.0055, 0.0045]
      interior_phase: liquid

initial_velocity: null
boundary_condition: null
