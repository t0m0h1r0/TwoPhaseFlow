# Temporary water-air rising-bubble common-flux probe: 10 mm x 20 mm,
# 32 x 64, advance from t=0 to T=0.02 s with 0.005 s restart checkpoints.
# Uses the same conservative common-flux stack as ch14_rising_bubble.yaml.

experiment:
  type: circle

grid:
  cells: [32, 64]
  domain:
    size: [0.01, 0.02]
    boundary: wall
  distribution:
    schedule: 0
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0

interface:
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      method: face_implicit
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 0
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0
      volume_constraint: sharp_phase_volume

physics:
  phases:
    liquid:
      rho: 1000.0
      mu: 1.0e-3
    gas:
      rho: 1.2
      mu: 1.8e-5
  surface_tension: 0.072
  gravity: 9.81

run:
  momentum_form: conservative_common_flux
  time:
    final: 0.02
    cfl: 1.0
    print_every: 100
  debug:
    step_diagnostics: true

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: psi
      spatial: fccd
      time_integrator: tvd_rk3
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: balanced_buoyancy
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        formulation: pressure_jump
        source: closed_interface_riesz
        closed_interface:
          endpoint: conservative_psi
          residual_contract:
            metric: pressure_adjoint
            constraints: [component_volume]
            fail_close: true
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_reaction_projection: pressure_component_hodge
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 12
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/_tmp_ch14_rising_bubble_common_flux_n32x64_t002
  save_npz: true
  checkpoints:
    interval: 0.005
  snapshots:
    interval: 0.005
  figures:
    - type: time_series
      title: "Water-air rising bubble continuation: centroid height"
      x: times
      y: [yc]
      labels: ["$y_c(t)$"]
      xlabel: "$t$"
      ylabel: "$y_c$"
      file: bubble_centroid_y.pdf

    - type: time_series
      title: "Water-air rising bubble continuation: mean rise velocity"
      x: times
      y: [mean_rise_velocity]
      labels: ["$\\bar{v}_g(t)$"]
      xlabel: "$t$"
      ylabel: "$\\bar{v}_g$"
      file: mean_rise_velocity.pdf

    - type: time_series
      title: "Water-air rising bubble continuation: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air rising bubble continuation: deformation"
      x: times
      y: [deformation]
      labels: ["$D(t)$"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      file: deformation.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    # The affine jump face cochain is not always integrable as a scalar Hodge
    # representative for this bubble case; plot the stored scalar pressure as
    # a gauge field rather than relabeling a nonintegrable cochain.
    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics: [volume_conservation, bubble_centroid, mean_rise_velocity, deformation]

initial_condition:
  background_phase: liquid
  objects:
    - type: circle
      center: [0.005, 0.005]
      radius: 0.0025
      interior_phase: gas

initial_velocity: null
boundary_condition:
  type: wall
