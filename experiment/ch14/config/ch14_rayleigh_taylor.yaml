# Rayleigh-Taylor instability: silicone oil (light, BELOW) / water (heavy, ABOVE).
# Atwood number A = (rho_w - rho_oil) / (rho_w + rho_oil) ≈ 0.0256 — low-Atwood regime.
# Production numerical stack: active-geometry capillary decomposition + FCCD PPE +
# bundle Young-Laplace work + UCCD6 + IMEX-BDF2.
#
# Schema convention:
#   physics.phases.liquid = silicone oil (lower phase; interior_phase: liquid in initial_condition)
#   physics.phases.gas    = water (upper phase; the schema slot is named "gas" by
#                                  convention — physical water is the heavy liquid here).
# The header documents the relabeling so the YAML stays self-describing.
#
# Handler dispatch:
#   experiment.type: capillary_wave  → CapillaryWaveHandler
#   The shape is identical to the capillary-wave benchmark; what makes this RT
#   instead of capillary is gravity > 0 with the heavy phase above the interface.
# YAML ownership: scheme choices, numerical parameters, and initial state are
# user-owned and explicit below; code only validates and derives internal ledgers.

experiment:
  type: capillary_wave

grid:
  cells: [128, 512]
  domain:
    size: [0.5, 2.0]
    boundary:
      x: periodic
      y:
        lower: wall
        upper: wall
  distribution:
    schedule: 1
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0

interface:
  state_space: active_geometry_capillary
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      # Scalar face-native Young-Laplace jump; the invalid P2 ALE face-cochain
      # route is fail-closed for pressure-jump production configs.
      method: face_implicit
  reinitialization:
    algorithm: compatibility_projection
    schedule:
      every_steps: 1
    profile:
      eps_scale: 1.0
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:                # silicone oil 5cSt (light, below the interface)
      rho: 950.0
      mu: 5.0e-3
    gas:                   # water (heavy, above the interface) — schema slot named "gas"
      rho: 1000.0
      mu: 1.0e-3
  surface_tension: 0.040   # water / silicone-oil interfacial tension ≈ 0.040 N/m
  gravity: 9.81            # downward; unstable since heavy phase sits on top

run:
  momentum_form: conservative_common_flux
  time:
    final: 7.0             # γ = sqrt(A·g·k) ≈ 1.78 1/s; t_final ≈ 12.5/γ → well into nonlinear mushroom regime
    cfl: 1.0
    print_every: 20
  debug:
    step_diagnostics: true

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: q
      spatial: geometric_swept_volume
      time_integrator: tvd_rk3
      boundedness: certified
      fail_close: true
    tracking:
      primary: q
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: none
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      gravity:
        formulation: variational_potential
        transport_adjoint: common_flux
        metric: transported_face_mass
        hodge_gate: fail_close
        work_gate: diagnostic
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        gradient: none
        formulation: pressure_jump
        source: bundle_virtual_work
        closed_interface:
          endpoint: geometric_cell_fraction
          residual_contract:
            metric: pressure_adjoint
            constraints: [cell_volume]
            fail_close: true
  projection:
    active_geometry:
      solver:
        scheme: pcg
        convergence:
          norm: linf
          absolute_tolerance: 1.0e-11
          relative_tolerance: 0.0
          max_iterations: 32
        pcg:
          tolerance: 1.0e-12
          max_iterations: 256
          roundoff_floor: 1.0e-14
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    preserve_projected_faces: true
    boundary_hodge:
      # SP-AN state-space contract shared by ch14 production YAMLs.  The
      # production restricted solve remains off; for x-periodic/y-wall runs
      # this records the quotient-compatible wall face space explicitly.
      mode: off
      state_space: constrained_face
      wall_trace: reconstruct_nodes
      wall_retraction: metric_projection
      metric: transported_face_mass
      pressure_pairing: restricted_variational_adjoint
      solver: matrix_free_cg
      tolerance: 1.0e-10
      max_iterations: 80
      gate: diagnostic
    pressure_history:
      form: pressure_coordinate
      extrapolation: bdf2
      reaction: variational_adjoint
      metric: transported_face_mass
      range_gate: fail_close
      work_gate: fail_close
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_reaction_projection: pressure_component_hodge
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 12
          tolerance: 1.0e-8
          relaxation: 0.7
          fail_close: true
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_rayleigh_taylor
  save_npz: true
  snapshots:
    interval: 0.05
  figures:
    - type: time_series
      title: "RT water-silicone-oil: interface amplitude"
      x: times
      y: [interface_amplitude]
      labels: ["A(t)"]
      xlabel: "$t$"
      ylabel: "$A(t)$"
      yscale: log
      file: interface_amplitude.pdf

    - type: time_series
      title: "RT water-silicone-oil: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: time_series
      title: "RT water-silicone-oil: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      shared_scale: true
      show_field: false
      color_quantity: speed
      color_scale: max
      colorbar_label: "$|u|$"
      vector_cmap: viridis
      background_color: "#eeeeee"
      normalize_arrows: false
      quiver_length_fraction: 0.14
      quiver_min_speed_fraction: 0.02
      quiver_width: 0.0055
      quiver_outline_width_factor: 2.1
      arrow_color: null
      arrow_outline_color: "#ffffff"
      arrow_alpha: 1.0
      arrow_outline_alpha: 0.9
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure_hodge
      shared_scale: true
      symmetric_scale: true
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, interface_amplitude]

initial_condition:
  background_phase: gas
  objects:
    - type: capillary_wave  # semantically RT; gravity makes the heavy upper phase unstable
      axis: y               # interface is y = mean + amplitude*cos(2π*mode*x/length + phase)
      mean: 1.0             # interface at mid-domain (domain y ∈ [0, 2.0])
      amplitude: 0.01       # 1% of half-domain — small linear perturbation
      mode: 1               # single wavelength fits the domain width (length: 0.5)
      length: 0.5           # = domain x-extent
      phase: 0.0
      interior_phase: liquid  # silicone oil below interface (φ = sdf < 0 region)

initial_velocity: null     # start at rest
boundary_condition:
  type: wall
