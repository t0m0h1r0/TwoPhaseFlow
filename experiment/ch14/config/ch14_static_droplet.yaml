# N=128 water-air static-droplet route on a fully periodic fitted grid.
# This reuses the ch14 production stack while replacing the capillary-wave graph
# interface by a centred circular liquid droplet.
# - Boundary topology: x and y are both periodic; no wall monitor or wall
#   velocity closure is declared.
# - Grid fitting: both tensor-product axes are nonuniform and rebuilt/remapped
#   every physical step so the fitted grid follows the current interface
#   geometry.

experiment:
  type: circle

grid:
  cells: [128, 128]
  domain:
    size: [1.0, 1.0]
    boundary: periodic
  distribution:
    schedule: 1
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0

interface:
  state_space:
    kind: geometric_cell_fraction
    conserved_variable: q
    normalized_view: theta
    gauge:
      variable: phi
      trace: p1_levelset
    compatibility:
      constraint: hard_cell_volume
      units: physical_volume
      projection:
        implementation: active_cached
        dense_reference: test_only
        gpu_contract:
          required: true
          active_storage: struct_of_arrays
          inner_host_transfers: forbidden
          dense_runtime_fallback: forbidden
          record_kernel_counters: true
        method: fixed_stratum_schur
        metric: screened_gauge_hodge
        fail_close: true
        trust_region: sign_margin
        residual_tolerance: 1.0e-11
        condition_gate: fail_close
        support_budget:
          max_active_ratio: 0.25
          max_support_stream_ratio: 0.25
          max_epoch_growth_ratio: 1.5
          on_overrun: fail_close
        solver:
          primary: active_pcg_newton
          accelerators:
            dc_candidate:
              enabled: true
              role: proposal_only
              on_reject: discard_candidate
          fallback:
            policy: none
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      # Scalar face-native Young-Laplace jump.  The P2 ALE discrete-gradient
      # face-cochain route is fail-closed for production pressure-jump runs
      # until its pressure-jump range projection passes the static-droplet
      # Hodge gate.
      method: face_implicit
  reinitialization:
    algorithm: none
    schedule:
      every_steps: 0
    profile:
      eps_scale: 1.0
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 1000.0
      mu: 1.0e-3
    gas:
      rho: 1.2
      mu: 1.8e-5
  surface_tension: 0.072
  gravity: 0.0

run:
  momentum_form: conservative_common_flux
  time:
    final: 40.0
    # Multiplier on theory CFL constants; 1.0 uses the §7 CFL budget.
    cfl: 1.0
    print_every: 20
  debug:
    step_diagnostics: false

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: q
      spatial: geometric_swept_volume
      time_integrator: tvd_rk3
      boundedness: certified
      fail_close: true
    tracking:
      primary: q
  momentum:
    form: conservative_common_flux
    predictor:
      assembly: none
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 12
            relaxation: 0.8
      surface_tension:
        gradient: none
        formulation: pressure_jump
        source: bundle_virtual_work
        closed_interface:
          endpoint: geometric_cell_fraction
          residual_contract:
            metric: pressure_adjoint
            constraints: [cell_volume]
            fail_close: true
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    preserve_projected_faces: true
    boundary_hodge:
      # SP-AN state-space contract shared by ch14 production YAMLs.  The
      # production restricted solve remains off; diagnostics still parse the
      # same wall/quotient face space if this periodic case is later changed
      # to a wall-bounded domain.
      mode: off
      state_space: constrained_face
      wall_trace: reconstruct_nodes
      wall_retraction: metric_projection
      metric: transported_face_mass
      pressure_pairing: restricted_variational_adjoint
      solver: matrix_free_cg
      tolerance: 1.0e-10
      max_iterations: 80
      gate: diagnostic
    pressure_history:
      form: pressure_coordinate
      extrapolation: bdf2
      reaction: variational_adjoint
      metric: transported_face_mass
      range_gate: fail_close
      work_gate: fail_close
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
        pressure_force_contract: variational_adjoint
        scalar_operator_pairing: variational_operator
        capillary_reaction_projection: pressure_component_hodge
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 12
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_static_droplet_periodic
  save_npz: true
  snapshots:
    interval: 0.1
  figures:
    - type: time_series
      title: "Water-air static droplet: deformation"
      x: times
      y: [deformation]
      labels: ["D(t)"]
      xlabel: "$t$"
      ylabel: "$D = (L-B)/(L+B)$"
      file: deformation.pdf

    - type: time_series
      title: "Water-air static droplet: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Water-air static droplet: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      shared_scale: true
      show_field: false
      color_quantity: speed
      color_scale: max
      colorbar_label: "$|u|$"
      vector_cmap: viridis
      background_color: "#eeeeee"
      normalize_arrows: false
      quiver_length_fraction: 0.14
      quiver_min_speed_fraction: 0.02
      quiver_width: 0.0055
      quiver_outline_width_factor: 2.1
      arrow_color: null
      arrow_outline_color: "#ffffff"
      arrow_alpha: 1.0
      arrow_outline_alpha: 0.9
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure_hodge
      shared_scale: true
      symmetric_scale: true
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, deformation]

initial_condition:
  background_phase: gas
  objects:
    - type: circle
      center: [0.5, 0.5]
      radius: 0.25
      interior_phase: liquid

initial_velocity: null
boundary_condition: null
