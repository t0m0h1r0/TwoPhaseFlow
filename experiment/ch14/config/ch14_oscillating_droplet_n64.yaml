# N=64 Rayleigh-Lamb n=2 oscillating droplet benchmark derived from
# ch14_static_droplet.yaml. The circular initial interface is replaced by
# a true ellipse sized like the static-droplet benchmark: semi-axes
# a=0.275, b=0.225 give area-equivalent radius sqrt(ab)=0.24875,
# comparable to the static-droplet radius R=0.25.

experiment:
  type: ellipse

grid:
  cells: [64, 64]
  domain:
    size: [1.0, 1.0]
    boundary: periodic
  distribution:
    schedule: 1
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 4.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 4.0

interface:
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      method: psi_direct_filtered
      cap: 40.0
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 0
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 1000.0
      mu: 1.0e-3
    gas:
      rho: 1.2
      mu: 1.8e-5
  surface_tension: 0.072
  gravity: 0.0

run:
  time:
    final: 1.5
    # Period-one surface-tension forcing needs a stricter capillary CFL than
    # the gentle static-droplet route.
    cfl: 0.2
    print_every: 200
  debug:
    step_diagnostics: false

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: psi
      spatial: fccd
      time_integrator: tvd_rk3
  momentum:
    predictor:
      assembly: balanced_buoyancy
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 3
            relaxation: 0.8
      surface_tension:
        formulation: pressure_jump
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 3
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_oscillating_droplet_n64
  save_npz: true
  snapshots:
    interval: 0.05
  figures:
    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet: signed deformation"
      x: times
      y: [signed_deformation]
      labels: ["simulation"]
      xlabel: "$t$"
      ylabel: "$D_s(t)$"
      analytical:
        formula: prosperetti
        omega0: 0.167435
        beta: 0.0
        D0: 0.10
      file: signed_deformation.pdf

    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

    - type: snapshot_series
      field: psi
      file_prefix: psi_t

    - type: snapshot_series
      field: velocity
      file_prefix: velocity_t

    - type: snapshot_series
      field: pressure
      file_prefix: pressure_t

diagnostics: [volume_conservation, kinetic_energy, deformation, signed_deformation]

initial_condition:
  background_phase: gas
  objects:
    - type: ellipse
      center: [0.5, 0.5]
      semi_axes: [0.275, 0.225]
      interior_phase: liquid

initial_velocity: null
boundary_condition: null
