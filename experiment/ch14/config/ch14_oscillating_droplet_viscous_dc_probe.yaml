# Viscous-DC route probe for the Rayleigh-Lamb n=2 oscillating droplet.
# Physical viscosity is zero, so the implicit-BDF2 Helmholtz equation reduces
# to the identity; any new instability here would implicate the DC route itself.

grid:
  cells: [32, 32]
  domain:
    size: [1.0, 1.0]
    boundary: periodic
  distribution:
    schedule: 0
    axes:
      x:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0
      y:
        type: nonuniform
        monitors:
          interface:
            alpha: 2.0

interface:
  thickness:
    mode: local
    base_factor: 1.5
  geometry:
    curvature:
      method: psi_direct_filtered
      cap: 8.0
  reinitialization:
    algorithm: ridge_eikonal
    schedule:
      every_steps: 0
    profile:
      eps_scale: 1.4
      ridge_sigma_0: 3.0

physics:
  phases:
    liquid:
      rho: 1.0
      mu: 0.0
    gas:
      rho: 1.0
      mu: 0.0
  surface_tension: 1.0
  gravity: 0.0

run:
  time:
    final: 0.15
    cfl: 1.0
    print_every: 200
  debug:
    step_diagnostics: true

numerics:
  time:
    algorithm: fractional_step
  interface:
    transport:
      variable: psi
      spatial: fccd
      time_integrator: tvd_rk3
  momentum:
    predictor:
      assembly: balanced_buoyancy
    terms:
      convection:
        spatial: uccd6
        time_integrator: imex_bdf2
      pressure:
        gradient: fccd
      viscosity:
        spatial: ccd
        time_integrator: implicit_bdf2
        solver:
          kind: defect_correction
          tolerance: 1.0e-8
          corrections:
            max_iterations: 3
            relaxation: 0.8
      surface_tension:
        formulation: pressure_jump
  projection:
    face_flux_projection: true
    canonical_face_state: true
    face_native_predictor_state: true
    poisson:
      operator:
        discretization: fccd
        coefficient: phase_separated
        interface_coupling: affine_jump
      solver:
        kind: defect_correction
        corrections:
          max_iterations: 3
          tolerance: 1.0e-8
          relaxation: 0.7
        base_solver:
          discretization: fd
          kind: direct

output:
  dir: results/ch14_oscillating_droplet_viscous_dc_probe
  save_npz: true
  snapshots:
    interval: 0.05
  figures:
    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet DC probe: signed deformation"
      x: times
      y: [signed_deformation]
      labels: ["simulation"]
      xlabel: "$t$"
      ylabel: "$D_s(t)$"
      analytical:
        formula: prosperetti
        omega0: 13.856406
        beta: 0.0
        D0: 0.02
      file: signed_deformation.pdf

    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet DC probe: volume drift"
      x: times
      y: [volume_conservation]
      labels: ["$|\\Delta V|/V_0$"]
      xlabel: "$t$"
      ylabel: "$|\\Delta V|/V_0$"
      yscale: log
      file: volume_drift.pdf

    - type: time_series
      title: "Rayleigh-Lamb n=2 droplet DC probe: kinetic energy"
      x: times
      y: [kinetic_energy]
      labels: ["KE"]
      xlabel: "$t$"
      ylabel: "$E_k$"
      yscale: log
      file: kinetic_energy.pdf

diagnostics: [volume_conservation, kinetic_energy, deformation, signed_deformation]

initial_condition:
  type: perturbed_circle
  center: [0.5, 0.5]
  radius: 0.25
  epsilon: 0.02
  mode: 2
  interior_phase: liquid

initial_velocity: null
boundary_condition: null
