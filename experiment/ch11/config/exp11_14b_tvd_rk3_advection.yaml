# [11-14b] TVD-RK3 scalar advection temporal accuracy
# Validates: Ch6 — SSP-RK3 O(dt^3) on CCD advection at fixed N=256.

experiment:
  id: "11-14b"
  title: "TVD-RK3 Time Integration: CCD advection (N=256)"
  type: time_accuracy

scheme:
  operator: tvd_rk3_advection
  params: {N: 256}

input:
  n_steps_list: [10, 20, 40, 80, 160, 320, 640]
  T_final: 1.0

reference:
  type: analytical
  solution: zero   # adapter returns L2 error directly (period return)
  params: {}

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - case: default
      series_label: "TVD-RK3 + CCD"
      error_key: err
      ref_orders: [2, 3]
      xlabel: "$\\Delta t$"
      ylabel: "$L^2$ error"
      title: "TVD-RK3 advection temporal convergence"
  output_stem: tvd_rk3_advection
