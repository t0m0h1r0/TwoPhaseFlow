# [11-15] AB2 Time Integration Accuracy
# Validates: Ch6 — Adams-Bashforth 2nd order with Euler startup.
# Equivalent to: experiment/ch11/exp11_15_ab2_time.py

experiment:
  id: "11-15"
  title: "AB2 Time Integration Accuracy (ODE dq/dt=-q)"
  type: time_accuracy

scheme:
  operator: ab2_ode
  params:
    ode: decay   # dq/dt = -q, q(0) = 1

input:
  n_steps_list: [16, 32, 64, 128, 256, 512]
  T_final: 1.0

reference:
  type: analytical
  solution: ode_decay_exact
  params: {}   # T is taken from input.T_final

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - series_label: "AB2 (Euler startup)"
      error_key: err
      xlabel: "$\\Delta t$"
      ylabel: "$|q - e^{-1}|$"
      title: "AB2 ODE convergence: $dq/dt=-q$"
      ref_orders: [1, 2]
  output_stem: ab2_time
