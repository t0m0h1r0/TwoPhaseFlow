# [11-05] RC vs C/RC Pressure Gradient Bracket
# Validates: Ch8 — C/RC bracket improves O(h^2) → O(h^4).

experiment:
  id: "11-05"
  title: "RC vs C/RC Bracket Convergence"
  type: convergence_study

scheme:
  operator: rc_bracket
  cases:
    - label: default
      params: {}

input:
  grid_sizes: [16, 32, 64, 128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - case: default
      title: "RC vs C/RC bracket: $p = \\cos(2\\pi x)\\cos(2\\pi y)$"
      error_keys: [err_std, err_crc]
      ref_orders: [2, 4]
      xlabel: "$h$"
      ylabel: "$L^\\infty$ face gradient error"
  output_stem: rc_bracket
