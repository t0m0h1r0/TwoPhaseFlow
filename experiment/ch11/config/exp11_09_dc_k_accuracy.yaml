# [11-09] Defect Correction: k-iteration accuracy
# Validates: Ch9b — DC k=1 → O(h^2); k=2 → O(h^4); k≥3 → O(h^7).

experiment:
  id: "11-09"
  title: "DC Poisson Dirichlet: k-iteration convergence"
  type: convergence_study

scheme:
  operator: dc_poisson_dirichlet
  cases:
    - label: k1
      params: {k_dc: 1}
    - label: k2
      params: {k_dc: 2}
    - label: k3
      params: {k_dc: 3}
    - label: k5
      params: {k_dc: 5}
    - label: k10
      params: {k_dc: 10}

input:
  grid_sizes: [8, 16, 32, 64, 128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - all_cases: true
      title: "DC $k$-iteration accuracy: $p^* = \\sin(\\pi x)\\sin(\\pi y)$"
      error_keys: [Li]
      ref_orders: [2, 4, 6]
      xlabel: "$h$"
      ylabel: "$L^\\infty$ error"
  output_stem: dc_k_accuracy
