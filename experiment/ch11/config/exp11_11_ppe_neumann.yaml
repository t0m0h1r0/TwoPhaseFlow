# [11-11] PPE Neumann BC + gauge fixing
# Validates: Ch9c — Neumann BC treatment with gauge pinning, O(h^5) convergence.
# Equivalent to: experiment/ch11/exp11_11_ppe_neumann.py

experiment:
  id: "11-11"
  title: "PPE Neumann BC + Gauge Pin (DC k=3)"
  type: convergence_study

scheme:
  operator: ppe_neumann
  cases:
    - label: default
      params:
        k_dc: 3

input:
  grid_sizes: [8, 16, 32, 64, 128]
  domain: {Lx: 1.0, Ly: 1.0}

visualization:
  type: convergence_loglog
  layout: "1x1"
  panels:
    - case: default
      title: "PPE Neumann BC + gauge pin"
      error_keys: [Li]
      ref_orders: [4, 5, 6]
      xlabel: "$h$"
      ylabel: "$L^\\infty$ error"
  output_stem: ppe_neumann
