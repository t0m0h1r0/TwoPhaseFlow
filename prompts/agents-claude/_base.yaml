# _base.yaml — Universal Agent Foundation v7.0.0 (Claude)
# All agent prompts implicitly inherit this file.
# Agents declare ONLY overrides and domain-specific content (primitive-diff inheritance).
# To understand an agent: read _base.yaml FIRST, then the agent file.

meta_version: "7.0.0"
concurrency_profile: "worktree"
handoff_mode: "text"

# v7.0.0 feature flags
proto_debate: true           # HAND-04 PROTO-DEBATE available (kernel-ops.md §HAND-04)
dynamic_replan: true         # BLOCKED_REPLAN_REQUIRED status active (kernel-workflow.md §DYNAMIC-REPLANNING)
context_condensation: true   # OP-CONDENSE trigger active (kernel-ops.md §OP-CONDENSE)
evaluation_mode: "rubric"    # ConsistencyAuditor uses R1-R4 rubric ≥80 PASS (kernel-roles.md §EVALUATOR-OPTIMIZER)
max_replan_cycles: 2         # AP-12: 3rd cycle → mandatory user escalation

axioms: "A1–A11 unconditional (docs/00_GLOBAL_RULES.md §A) — SSoT: kernel-constitution.md"
project_rules: "PR-1–PR-6 (docs/03_PROJECT_RULES.md — SSoT: kernel-project.md)"

dirs:
  lib:     "src/twophase/"
  exp:     "experiment/ch{N}/"
  results: "experiment/ch{N}/results/{name}/"
  graphs:  "experiment/ch{N}/results/{name}/ — PDF only"
  meta:    "prompts/meta/"
  agents:  "prompts/agents-claude/"
  memo:    "docs/memo/"
  wiki:    "docs/wiki/"
  locks:   "docs/locks/"

primitives_default:
  classify_before_act: true
  scope_creep: reject
  uncertainty_action: stop
  evidence_required: always
  tool_delegate_numerics: true

rules_always:
  - STOP_CONDITIONS           # kernel-ops.md §STOP CONDITIONS
  - DOM-02_CONTAMINATION_GUARD
  - SCOPE_BOUNDARIES
  - BRANCH_LOCK_CHECK         # read ACTIVE_LEDGER §4 + docs/locks/ before any write

on_demand_common:
  HAND-01:          "kernel-ops.md §HAND-01"
  HAND-02:          "kernel-ops.md §HAND-02"
  HAND-03:          "kernel-ops.md §HAND-03"
  HAND-04:          "kernel-ops.md §HAND-04"        # v7.0.0
  OP-CONDENSE:      "kernel-ops.md §OP-CONDENSE"    # v7.0.0
  GIT-SP:           "kernel-ops.md §GIT-SP"
  GIT-WORKTREE-ADD: "kernel-ops.md §GIT-WORKTREE-ADD"
  GIT-ATOMIC-PUSH:  "kernel-ops.md §GIT-ATOMIC-PUSH"
  LOCK:             "kernel-ops.md §LOCK-ACQUIRE"
  UNLOCK:           "kernel-ops.md §LOCK-RELEASE"
  HAND_SCHEMA:      "kernel-roles.md §SCHEMA-IN-CODE"
  K-COMPILE:        "kernel-ops.md §K-COMPILE"
  K-LINT:           "kernel-ops.md §K-LINT"

procedure_pre:
  - "HAND-03() — run 7-check acceptance before any work"
  - "DOM-02 write scope check before any file write"
  - "LOCK(branch) if concurrency_profile == worktree and task writes — STOP-10 on collision"

procedure_post:
  - "CoVe (kernel-roles.md §COVE MANDATE) before HAND-02 — Specialists only"
  - "HAND-02(status, produced) — emit RETURN"
  - "UNLOCK(branch) on SUCCESS; retain lock on FAIL"

recovery: "kernel-workflow.md §STOP-RECOVER MATRIX"
