# _base.yaml — Universal Agent Foundation
# All agent prompts implicitly inherit this file.
# Agents define ONLY overrides and domain-specific content.
# To understand an agent: read _base.yaml FIRST, then the agent file.

meta_version: "5.1.0"
# Feature flag controlling concurrency-awareness. See prompts/meta/meta-core.md §φ4.1 / §A8.1
# and prompts/meta/meta-ops.md §GIT-WORKTREE-ADD / §LOCK-ACQUIRE.
#   "legacy"   — v5.0 behavior: DOM-01/DOM-02 alone gate writes; branch isolation via GIT-SP only.
#   "worktree" — v5.1.0 Concurrency-Aware: GIT-WORKTREE-ADD, LOCK-ACQUIRE/RELEASE, GIT-ATOMIC-PUSH,
#                STOP-09/10/11 enforced. Flip in a dedicated single-line commit (Phase D.3 of
#                CHK-114) and revert the same way if problems occur.
concurrency_profile: "worktree"

# Handoff emission mode. See MetaEvolutionArchitect v1.1 (CHK-NEW-0 / Phase P0).
#   "text"     — v5.1.0 behavior: HAND-01/02/03 emitted as JSON blocks in prose.
#   "tool_use" — v1.2+ (reserved): HAND tokens emitted via function calls (emit_hand01/02, run_hand03).
# Flipping to "tool_use" is OUT OF SCOPE for v1.1 — dual emission triggers reserved STOP-12.
handoff_mode: "text"

axioms: "A1–A11 apply unconditionally (docs/00_GLOBAL_RULES.md §A) + v5.1 sub-axioms φ4.1 / A8.1 (meta-core.md)"
project_rules: "PR-1–PR-6 apply to this project (docs/03_PROJECT_RULES.md, SSoT: prompts/meta/meta-project.md)"

# --- Directory Conventions (ALL agents inherit) ---
# Authoritative source: prompts/meta/meta-domains.md § ARTIFACT & DIRECTORY CONVENTIONS
directory_conventions:
  library_code: "src/ (src/twophase/) — lib/ is NOT used"
  experiment_scripts: "experiment/ch{N}/ — chapter-based subdirectories (ch10, ch11, ch12)"
  experiment_results: "experiment/ch{N}/results/{experiment_name}/ — colocated with scripts"
  experiment_graphs: "experiment/ch{N}/results/{experiment_name}/ — PDF format ONLY"
  experiment_data_persistence: "Scripts MUST save raw result data (NPZ/CSV/JSON) and support --plot-only re-plotting"
  meta_prompts: "prompts/meta/ — top-level meta/ is NOT used"
  agent_prompts: "prompts/agents-claude/ (Claude) | prompts/agents-codex/ (Codex)"
  short_papers_and_theory: "docs/memo/ — Markdown/TeX, Japanese (theory derivations also here)"

primitives_default:
  classify_before_act: true
  scope_creep: reject
  uncertainty_action: stop
  evidence_required: always
  tool_delegate_numerics: true
  cognitive_style: structural_logic
  thought_format: slp_01_shorthand

rules_always:
  - STOP_CONDITIONS
  - DOM-02_CONTAMINATION_GUARD
  - SCOPE_BOUNDARIES
  - BRANCH_LOCK_CHECK    # v5.1: read docs/02_ACTIVE_LEDGER.md §4 + docs/locks/ before any write when concurrency_profile == "worktree"

on_demand_common:
  HAND-03: "prompts/meta/meta-ops.md §HAND-03"
  GIT-SP:  "prompts/meta/meta-ops.md §GIT-SP"
  HAND-01: "prompts/meta/meta-ops.md §HAND-01"
  HAND-02: "prompts/meta/meta-ops.md §HAND-02"
  K-COMPILE: "prompts/meta/meta-ops.md §K-COMPILE"
  K-LINT:    "prompts/meta/meta-ops.md §K-LINT"
  # v5.1 concurrency primitives (gated by concurrency_profile == "worktree"):
  GIT-WORKTREE-ADD: "prompts/meta/meta-ops.md §GIT-WORKTREE-ADD"
  GIT-ATOMIC-PUSH:  "prompts/meta/meta-ops.md §GIT-ATOMIC-PUSH"
  LOCK-ACQUIRE:     "prompts/meta/meta-ops.md §LOCK-ACQUIRE"
  LOCK-RELEASE:     "prompts/meta/meta-ops.md §LOCK-RELEASE"
  HAND_SCHEMA:      "meta-roles.md §SCHEMA-IN-CODE"

procedure_pre:
  - "Run HAND-03 acceptance check (→ meta-ops.md §HAND-03)"
  - "Verify write scope via DOM-02 before any file write"
  - "IF concurrency_profile == 'worktree': run LOCK-ACQUIRE for {task.branch} (→ meta-ops.md §LOCK-ACQUIRE); STOP-10 on collision"

procedure_post:
  - "Issue HAND-02 RETURN on completion (schema: → meta-roles.md §SCHEMA-IN-CODE)"
  # Specialists: CoVe MUST complete before this step (→ meta-roles.md §COVE MANDATE)
  - "IF concurrency_profile == 'worktree' AND status == SUCCESS: run LOCK-RELEASE (→ meta-ops.md §LOCK-RELEASE); on FAIL retain lock for retry"

recovery: "→ meta-workflow.md §STOP-RECOVER MATRIX"

stop_post: "Recovery: look up trigger in meta-workflow.md §STOP-RECOVER MATRIX."
  # This line is appended to every agent's stop section via inheritance.
  # Generation rule 13 compliance — do NOT override unless agent has its own recovery pathway.
