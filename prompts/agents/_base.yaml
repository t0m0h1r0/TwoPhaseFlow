# _base.yaml — Universal Agent Foundation
# All agent prompts implicitly inherit this file.
# Agents define ONLY overrides and domain-specific content.
# To understand an agent: read _base.yaml FIRST, then the agent file.

axioms: "A1–A11 apply unconditionally (docs/00_GLOBAL_RULES.md §A)"
project_rules: "PR-1–PR-6 apply to this project (docs/03_PROJECT_RULES.md, SSoT: prompts/meta/meta-project.md)"

# --- Directory Conventions (ALL agents inherit) ---
# Authoritative source: prompts/meta/meta-domains.md § ARTIFACT & DIRECTORY CONVENTIONS
directory_conventions:
  library_code: "src/ (src/twophase/) — lib/ is NOT used"
  experiment_scripts: "experiment/ch{N}/ — chapter-based subdirectories (ch10, ch11, ch12)"
  experiment_results: "experiment/ch{N}/results/{experiment_name}/ — colocated with scripts"
  experiment_graphs: "experiment/ch{N}/results/{experiment_name}/ — PDF format ONLY"
  experiment_data_persistence: "Scripts MUST save raw result data (NPZ/CSV/JSON) and support --plot-only re-plotting"
  meta_prompts: "prompts/meta/ — top-level meta/ is NOT used"
  agent_prompts: "prompts/agents/"
  short_papers_and_theory: "docs/memo/ — Markdown/TeX, Japanese (theory derivations also here)"

primitives_default:
  classify_before_act: true
  scope_creep: reject
  uncertainty_action: stop
  evidence_required: always
  tool_delegate_numerics: true

rules_always:
  - STOP_CONDITIONS
  - DOM-02_CONTAMINATION_GUARD
  - SCOPE_BOUNDARIES

on_demand_common:
  HAND-03: "prompts/meta/meta-ops.md §HAND-03"
  GIT-SP:  "prompts/meta/meta-ops.md §GIT-SP"
  HAND-01: "prompts/meta/meta-ops.md §HAND-01"
  HAND-02: "prompts/meta/meta-ops.md §HAND-02"
  K-COMPILE: "prompts/meta/meta-ops.md §K-COMPILE"
  K-LINT:    "prompts/meta/meta-ops.md §K-LINT"

procedure_pre:
  - "Run HAND-03 acceptance check (→ meta-ops.md §HAND-03)"
  - "Verify write scope via DOM-02 before any file write"

procedure_post:
  - "Issue HAND-02 RETURN on completion"

recovery: "→ meta-workflow.md §STOP-RECOVER MATRIX"

stop_post: "Recovery: look up trigger in meta-workflow.md §STOP-RECOVER MATRIX."
  # This line is appended to every agent's stop section via inheritance.
  # Generation rule 13 compliance — do NOT override unless agent has its own recovery pathway.
